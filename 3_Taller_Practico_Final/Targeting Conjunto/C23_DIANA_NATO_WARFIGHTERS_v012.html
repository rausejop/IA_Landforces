}

/* ──────── ACH Matrix tab (deliverable C: CoA × Evidence CRUD) ──────── */
function ACHTab({ mission, setMission }) {
  const ach = mission.achMatrix || { coas:[], scores:{} };
  const events = [...(mission.geopoliticalEvents||[]), ...(mission.intelEvents||[])];

  const setScore = (eid, cid, val) =>
    setMission(m => ({...m, achMatrix:{...m.achMatrix, scores:{...(m.achMatrix?.scores||{}), [`${eid}::${cid}`]: val}}}));
  const addCoa = () => setMission(m => ({...m, achMatrix:{...m.achMatrix,
    coas:[...(m.achMatrix?.coas||[]), { id:newId("c"), side:"NATO", name:"New CoA", description:"", weight:1 }]}}));
  const updCoa = (id,k,v) => setMission(m => ({...m, achMatrix:{...m.achMatrix,
    coas:(m.achMatrix?.coas||[]).map(c=>c.id===id?{...c,[k]:v}:c)}}));
  const delCoa = (id) => { if (!window.confirm("Delete CoA?")) return;
    setMission(m => {
      const scores = {...(m.achMatrix?.scores||{})};
      Object.keys(scores).forEach(k => { if (k.endsWith(`::${id}`)) delete scores[k]; });
      return {...m, achMatrix:{...m.achMatrix, coas:(m.achMatrix?.coas||[]).filter(c=>c.id!==id), scores}};
    });
  };

  const ranked = scoreCoas(ach);

  /* v005 — AN-04: heuristic auto-suggest of cell scores using keyword + side overlap.
     Only fills empty cells; existing analyst scores are NEVER overwritten. */
  const tokenize = (s) => (s||"").toLowerCase().split(/[^a-z0-9]+/).filter(w=>w.length>3);
  const autoScore = () => {
    const next = {...(ach.scores||{})};
    let added = 0, kept = 0;
    events.forEach(ev => {
      const evTokens = new Set([...tokenize(ev.title), ...tokenize(ev.narrative)]);
      (ach.coas||[]).forEach(c => {
        const k = `${ev.id}::${c.id}`;
        if (next[k]) { kept++; return; }
        const coaTokens = new Set([...tokenize(c.name), ...tokenize(c.description)]);
        let overlap = 0; coaTokens.forEach(t => { if (evTokens.has(t)) overlap++; });
        let val = "";
        if (overlap >= 3) val = "CC";
        else if (overlap === 2) val = "C";
        else if (overlap === 1) val = "N";
        /* sides matter: an OPFOR-supporting event is II for a NATO defensive CoA */
        if (val && c.side === "NATO" && (ev.severity==="alert"||ev.severity==="warn")) {
          if (overlap >= 3) val = "II";
          else if (overlap === 2) val = "I";
        }
        if (val) { next[k] = val; added++; }
      });
    });
    setMission(m => ({...m, achMatrix:{...m.achMatrix, scores:next}}));
    window.alert(`Auto-score: ${added} cells filled, ${kept} cells preserved as set by analyst.`);
  };

  return (
    <section className="cfg-sec">
      <div className="oob-toolbar">
        <h4 style={{margin:0}}>ACH MATRIX · COURSES OF ACTION × EVIDENCE</h4>
        <span className="oob-count mono">{ach.coas?.length||0} CoAs · {events.length} EVENTS</span>
        <button className="btn-create" onClick={addCoa}>+ ADD CoA</button>
        {/* v005 — AN-04 */}
        <button className="btn-edit btn-sm" onClick={autoScore}
                title="Heuristic auto-score (keyword overlap; existing scores preserved)">⚛ AUTO-SCORE</button>
      </div>

      <h4 style={{margin:"4px 0"}}>COURSES OF ACTION</h4>
      <div className="crud-wrap" style={{marginBottom:14}}>
        <table className="crud-table">
          {/* v010 — LOO / LOE / C-IED PILLAR columns (AJP-3 / 5 / 3.15)
              v011 — ATO column (AJP-3.3) */}
          <thead><tr><th>ID</th><th>SIDE</th><th>NAME</th><th>DESCRIPTION</th><th>LOO</th><th>LOE</th><th>C-IED</th><th>ATO</th><th>SCORE</th><th></th></tr></thead>
          <tbody>{(ach.coas||[]).map(c=>{
            const r = ranked.find(x=>x.id===c.id);
            return (
              <tr key={c.id} className={`side-${c.side}`}>
                <td className="mono">{c.id}</td>
                <td>
                  <select className="ach-cell-edit" value={c.side} onChange={e=>updCoa(c.id,"side",e.target.value)}>
                    <option>NATO</option><option>OPFOR</option><option>NEUTRAL</option>
                  </select>
                </td>
                <td><input className="ach-cell-edit" value={c.name} onChange={e=>updCoa(c.id,"name",e.target.value)}/></td>
                <td><input className="ach-cell-edit" value={c.description||""} onChange={e=>updCoa(c.id,"description",e.target.value)}/></td>
                <td style={{minWidth:160}}>
                  <input className="ach-cell-edit"
                    value={(c.loo||[]).join("; ")}
                    onChange={e=>updCoa(c.id,"loo", e.target.value.split(";").map(s=>s.trim()).filter(Boolean))}
                    placeholder="(none)"/>
                </td>
                <td style={{minWidth:160}}>
                  <input className="ach-cell-edit"
                    value={(c.loe||[]).join("; ")}
                    onChange={e=>updCoa(c.id,"loe", e.target.value.split(";").map(s=>s.trim()).filter(Boolean))}
                    placeholder="(none)"/>
                </td>
                <td>
                  <select className="ach-cell-edit" value={c.ciedPillar||""} onChange={e=>updCoa(c.id,"ciedPillar",e.target.value)}>
                    <option value="">—</option>
                    <option>Defeat-Device</option>
                    <option>Attack-Network</option>
                    <option>Prepare-Force</option>
                  </select>
                </td>
                {/* v011 — ATO cycle phase (AJP-3.3). Optional; leave empty for non-AIR CoAs. */}
                <td>
                  <select className="ach-cell-edit" value={c.atoPhase||""} onChange={e=>updCoa(c.id,"atoPhase",e.target.value)}>
                    <option value="">—</option>
                    <option>planning</option>
                    <option>production</option>
                    <option>execution</option>
                    <option>assessment</option>
                  </select>
                </td>
                <td className="mono" style={{textAlign:"center"}}>{r?`${r.score>=0?"+":""}${r.score} (${r.evCount})`:"—"}</td>
                <td><button className="btn-del btn-sm" onClick={()=>delCoa(c.id)}>DEL</button></td>
              </tr>
            );
          })}</tbody>
        </table>
      </div>

      <h4 style={{margin:"4px 0"}}>EVIDENCE × CoA SCORING</h4>
      <p style={{fontSize:11,color:"var(--ink-mute)",margin:"0 0 6px"}}>
        For each evidence (event), mark each CoA Consistent (C, +1), Neutral (N, 0), or Inconsistent (I, -1).
        Add/edit events under the GEOPOLITICAL or INTEL EVENTS tabs.
      </p>
      <div className="ach-wrap">
        <table className="ach-table">
          <thead>
            <tr>
              <th style={{minWidth:240,textAlign:"left"}}>EVIDENCE</th>
              {(ach.coas||[]).map(c => (
                <th key={c.id} className={`coa-h side-${c.side}`}>

            {events.map(e => {

                  </td>
                  {(ach.coas||[]).map(c => {
                    const k = `${e.id}::${c.id}`;
                    const v = ach.scores?.[k] || "";
                    /* v003 — 5-level scale: CC +2, C +1, N 0, I -1, II -2 */
                    row += (ACH_VAL_MAP[v]||0);
                    return (
                      <td key={c.id}>
                        <select className={`ach-cell-edit ach-sel-${v||"none"}`}
                                value={v} onChange={ev=>setScore(e.id,c.id,ev.target.value)}>

                          {ACH_SCALE.map(r => (
                            <option key={r.code} value={r.code}>{r.num} · {r.code}</option>
                          ))}
                        </select>
                      </td>
                    );
                  })}
                  <td className="mono ach-tot">{row>=0?"+":""}{row}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div className="ach-legend">
        {ACH_SCALE.map(r => (
          <span key={r.code} style={{color:r.tone}}>
            <b>{r.num} · {r.code}</b> {r.label} ({r.value>=0?"+":""}{r.value})
          </span>
        ))}
      </div>
    </section>
  );
}

/* ──────── Decision-support / COA analytics ──────── */
function DecisionSupportTab({ mission, coaHistory, activeFaction }) {
  const ranked = scoreCoas(mission.achMatrix);
  /* Simulate COA outcomes (deliverable F: simulated probabilistic CoA analysis on multiple parameters) */
  const sims = useMemo(() => {
    return (mission.achMatrix?.coas||[]).map(c => {
      /* Pseudo-random but stable per id */
      let h = 0; for (const ch of c.id) h = (h*31 + ch.charCodeAt(0)) & 0xffff;
      const rng = () => { h = (h*48271) & 0x7fffffff; return (h/0x7fffffff); };
      return { id:c.id, name:c.name, side:c.side,
        success:Math.round(40+rng()*55), risk:Math.round(20+rng()*70),
        casualties:Math.round(10+rng()*70), logistics:Math.round(15+rng()*75),
        escalation:Math.round(10+rng()*80) };
    });
  }, [mission.achMatrix]);

  return (
    <section className="cfg-sec">
      <h4>ACH RANKING · TOP CoAs (acroos all evidence)</h4>
      <div className="crud-wrap" style={{marginBottom:12}}>
        <table className="crud-table">
          <thead><tr><th>RANK</th><th>SIDE</th><th>CoA</th><th>SCORE</th><th>EVIDENCE</th></tr></thead>
          <tbody>{ranked.map((r,i)=>(
            <tr key={r.id} className={`side-${r.side}`}>
              <td className="mono">{i+1}</td><td><span className={`pill side-${r.side}`}>{r.side}</span></td>
              <td>{r.name}</td><td className="mono">{r.score>=0?"+":""}{r.score}</td><td className="mono">{r.evCount}</td>
            </tr>))}</tbody>
        </table>
      </div>

      <h4>SIMULATED COA OUTCOMES (probabilistic — seeded per CoA, TRL6 stub)</h4>
      <div className="coa-grid">
        {sims.map(s => (
          <div key={s.id} className="coa-panel">
            <h5>{s.name} <span style={{color:s.side==="NATO"?"var(--allied)":"var(--hostile)",marginLeft:6}}>· {s.side}</span></h5>
            <CoaBar label="MISSION SUCCESS"   pct={s.success}/>
            <CoaBar label="RISK"              pct={s.risk}/>
            <CoaBar label="OWN CASUALTIES"    pct={s.casualties}/>
            <CoaBar label="LOGISTICS BURDEN"  pct={s.logistics}/>
            <CoaBar label="ESCALATION RISK"   pct={s.escalation}/>
          </div>
        ))}
      </div>

      <h4 style={{marginTop:18}}>TURN HISTORY (current faction: {activeFaction})</h4>
      <div className="crud-wrap">
        <table className="crud-table">
          <thead><tr><th>TS</th><th>PHASE</th><th>FACTION</th><th>MODE</th><th>COURSE OF ACTION</th></tr></thead>
          <tbody>{coaHistory.length===0
            ? <tr><td colSpan={5} style={{color:"var(--ink-mute)",textAlign:"center",padding:14}}>No turns played yet. Use CoA panel on left rail or AUTO mode.</td></tr>
            : coaHistory.map(t=>(
                <tr key={t.id} className={`side-${t.faction}`}>
                  <td className="mono">{dtgFmt(t.ts)}</td>
                  <td className="mono">{t.phase}</td>
                  <td><span className={`pill side-${t.faction}`}>{t.faction}</span></td>
                  <td className="mono">{t.mode}</td>
                  <td>{t.coaName}</td>
                </tr>))}
          </tbody>
        </table>
      </div>
    </section>
  );
}
function CoaBar({label,pct}) {
  return (
    <div className="coa-bar">
      <span className="lbl">{label}</span>
      <div className="meter"><span style={{width:`${pct}%`}}></span></div>
      <span className="pct">{pct}%</span>
    </div>
  );
}

/* ──────── AIS / Fusion tab ──────── */
function AISTab({ mission, setMission, pushLog }) {
  const data = mission.aisFeed?.DATA || [];
  const upd = (i,k,v) => setMission(m => {
    const arr = [...(m.aisFeed?.DATA||[])]; arr[i] = {...arr[i], [k]:v};
    return {...m, aisFeed:{...(m.aisFeed||{}), DATA:arr}};
  });
  const add = () => setMission(m => ({...m, aisFeed:{...(m.aisFeed||{METADATA:{}}),
    DATA:[...(m.aisFeed?.DATA||[]),
      { MMSI:"000000000", IMO:"", SHIP_ID:"", LAT:"55", LON:"19", SPEED:"0", HEADING:"0", COURSE:"0",
        STATUS:"0", TIMESTAMP:new Date().toISOString(), DSRC:"TER", UTC_SECONDS:"0", MARKET:"COMMERCIAL",
        SHIPNAME:"NEW VESSEL", SHIPTYPE:"80", CALLSIGN:"", FLAG:"--", LENGTH:"100", WIDTH:"15",
        GRT:"0", DWT:"0", DRAUGHT:"0", YEAR_BUILT:"", SHIP_COUNTRY:"", SHIP_CLASS:"",
        ROT:"0", TYPE_NAME:"Cargo", AIS_TYPE_SUMMARY:"Cargo", DESTINATION:"", ETA:"",
        L_FORE:"0", W_LEFT:"0", CURRENT_PORT:"", LAST_PORT:"", LAST_PORT_TIME:"",
        CURRENT_PORT_ID:"", CURRENT_PORT_UNLOCODE:"", CURRENT_PORT_COUNTRY:"",
        LAST_PORT_ID:"", LAST_PORT_UNLOCODE:"", LAST_PORT_COUNTRY:"",
        NEXT_PORT_ID:"", NEXT_PORT_UNLOCODE:"", NEXT_PORT_NAME:"", NEXT_PORT_COUNTRY:"",
        ETA_CALC:"", ETA_UPDATED:"", DISTANCE_TO_GO:"0", DISTANCE_TRAVELLED:"0",
        AVG_SPEED:"0", MAX_SPEED:"0" }]}}));
  const del = (i) => setMission(m => { const arr = [...(m.aisFeed?.DATA||[])]; arr.splice(i,1);
    return {...m, aisFeed:{...(m.aisFeed||{}), DATA:arr}}; });

  const onFile = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (Array.isArray(d.DATA)) {
          setMission(m => ({...m, aisFeed:d}));
          pushLog("AIS", `AIS feed loaded: ${d.DATA.length} vessels.`, "info");
        } else window.alert("Expected an object with DATA: [...] (Master Prompt ANNEX schema).");
      } catch (err) { window.alert("Parse error: "+err.message); }
    };
    r.readAsText(f);
  };

  return (
    <section className="cfg-sec">
      <div className="oob-toolbar">
        <h4 style={{margin:0}}>AIS / COMMERCIAL MARITIME · MULTI-SOURCE FUSION</h4>
        <span className="oob-count mono">{data.length} VESSELS</span>
        <button className="btn-create" onClick={add}>+ ADD VESSEL</button>
        <input type="file" accept=".json" onChange={onFile} className="io-file"/>
      </div>
      <p style={{fontSize:11.5,color:"var(--ink-dim)"}}>
        AIS schema follows the Master Prompt ANNEX format. The COP map renders each vessel as a triangular marker;
        red triangles flag dark-AIS / suspect tracks (FLAG=RU + DESTINATION='AIS OFF' / 'DARK ECHO' callsigns).
      </p>
      <div className="crud-wrap" style={{maxHeight:"45vh"}}>
        <table className="crud-table">
          <thead><tr><th>MMSI</th><th>NAME</th><th>FLAG</th><th>TYPE</th><th>LAT</th><th>LON</th><th>SPD</th><th>HDG</th><th>DEST</th><th>LAST PORT</th><th></th></tr></thead>
          <tbody>{data.map((v,i)=>(
            <tr key={i}>
              <td className="mono">{v.MMSI}</td>
              <td><input className="ach-cell-edit" value={v.SHIPNAME||""} onChange={e=>upd(i,"SHIPNAME",e.target.value)}/></td>
              <td><input className="ach-cell-edit" value={v.FLAG||""} onChange={e=>upd(i,"FLAG",e.target.value)}/></td>
              <td><input className="ach-cell-edit" value={v.TYPE_NAME||""} onChange={e=>upd(i,"TYPE_NAME",e.target.value)}/></td>
              <td><input className="ach-cell-edit" value={v.LAT||""} onChange={e=>upd(i,"LAT",e.target.value)}/></td>
              <td><input className="ach-cell-edit" value={v.LON||""} onChange={e=>upd(i,"LON",e.target.value)}/></td>
              <td><input className="ach-cell-edit" value={v.SPEED||""} onChange={e=>upd(i,"SPEED",e.target.value)}/></td>
              <td><input className="ach-cell-edit" value={v.HEADING||""} onChange={e=>upd(i,"HEADING",e.target.value)}/></td>
              <td><input className="ach-cell-edit" value={v.DESTINATION||""} onChange={e=>upd(i,"DESTINATION",e.target.value)}/></td>
              <td><input className="ach-cell-edit" value={v.LAST_PORT||""} onChange={e=>upd(i,"LAST_PORT",e.target.value)}/></td>
              <td><button className="btn-del btn-sm" onClick={()=>del(i)}>DEL</button></td>
            </tr>))}</tbody>
        </table>
      </div>
    </section>
  );
}

/* ──────── INFO modal — Instructions + Acronyms (deliverable G) ──────── */
/* ────────────────────────────────────────────────────────────────────
   v009 — Analytics tab (Cubo B hard):
   - AN-01 — keyword/source correlation engine across all event streams
   - AN-03 — second- and third-order effect cascades per CoA
   - LD-01 — live-feed adapter stub (poll-based; demonstrates the seam)
   - WF-04 — Operations Assessment subtab (MoP/MoE per LOO/LOE)
   ──────────────────────────────────────────────────────────────────── */
function correlateEvents(events) {
  /* AN-01 — cluster events by shared (source × top-keyword); return clusters with ≥ 2 members */
  const tokenize = (s) => (s||"").toLowerCase().split(/[^a-z0-9]+/).filter(w=>w.length>4);
  const clusters = new Map();
  events.forEach(e => {
    const toks = [...tokenize(e.title), ...tokenize(e.narrative)];
    if (!toks.length) return;
    const key = `${e.source||"?"}::${toks[0]}`;
    if (!clusters.has(key)) clusters.set(key, []);
    clusters.get(key).push(e);
  });
  return [...clusters.entries()]
    .filter(([,arr]) => arr.length >= 2)
    .map(([k,arr]) => ({ key:k, count:arr.length, events:arr,
      severity: arr.some(e=>e.severity==="alert") ? "alert"
              : arr.some(e=>e.severity==="warn") ? "warn" : "info" }))
    .sort((a,b)=>b.count-a.count);
}
function cascadeEffects(coa, mission) {
  /* v010 — driven by mission.cascadeRules table (each rule cites its AJP).
     Falls back to legacy hardcoded set if no table is present (back-compat for
     pre-v010 mission JSON imports). */
  const out = [];
  const desc = `${coa.name} ${coa.description||""}`.toLowerCase();
  const rules = mission.cascadeRules;
  if (Array.isArray(rules) && rules.length) {
    rules.forEach(r => {
      try {
        if (new RegExp(r.pattern, "i").test(desc)) {
          out.push({ order:r.order, dom:r.dom, txt:r.txt, ajp:r.ajp, ruleId:r.id });
        }
      } catch { /* malformed regex — skip this rule */ }
    });
  } else {
    /* legacy fallback — keeps pre-v010 behaviour for missions without cascadeRules */
    const push = (order, dom, txt, ajp) => out.push({ order, dom, txt, ajp });
    if (/interdict|naval/.test(desc)) {
      push(2,"SEA",      "Civil shipping reroute around exclusion zone (commercial impact).","AJP-3.1");
      push(3,"INFO",     "Insurance market reaction; freight rates spike across Baltic SLOC.","AJP-3.1");
    }
    if (/forward|reinforce|mech/.test(desc)) {
      push(2,"LOG",      "MSR AMBER under heavier wear; ASR PINE comes into use.","AJP-4.4");
      push(3,"HNS",      "Host-nation maintenance throughput exceeded; surge support requested.","AJP-4.3");
    }
    if (/cui|sabotage|cable/.test(desc)) {
      push(2,"INFRA",    "Estlink 2 + BalticConnector backup mode; reduced redundancy.","AJP-3.1");
      push(3,"STRATCOM", "Public attribution narrative needed within 24h to retain alliance cohesion.","AJP-10");
    }
    if (/pincer|suwalki|narva/.test(desc)) {
      push(2,"LAND",     "LOC interdiction risk between Poland and Lithuania.","AJP-3.2");
      push(3,"NEUTRAL",  "Civil evacuation pressure on Vilnius/Kaunas axis.","AJP-3.19");
    }
    if (/cyber|dco|oco|ddos/.test(desc)) {
      push(2,"CIS",      "PACE fall-back from Primary to Alternate likely in 2-6h.","AJP-6");
      push(3,"C2",       "Decision latency increases; commanders rely more on auto-mode CoAs.","AJP-3.20");
    }
  }
  if (out.length === 0) out.push({ order:2, dom:"GEN",
    txt:"(no cascade rules matched — add a rule under CONFIG → ANALYTICS → CASCADE RULES)", ajp:"-" });
  return out;
}
/* ────────────────────────────────────────────────────────────────────
   v011 — Wargaming tab — multi-CoA matchup runner (the spec mentions
   "wargaming" literally as a target capability). Uses the same seeded
   probabilistic outcomes as the per-CoA simulator (Decision Support tab),
   then computes pairwise outcomes for every NATO × OPFOR pairing.
   ──────────────────────────────────────────────────────────────────── */
function simulatedOutcome(coa) {
  /* Mirror of the v002 DecisionSupportTab simulator — seeded so each CoA
     gives a deterministic (reproducible) outcome across views. */
  let h = 0; for (const ch of coa.id) h = (h*31 + ch.charCodeAt(0)) & 0xffff;
  const rng = () => { h = (h*48271) & 0x7fffffff; return (h/0x7fffffff); };
  return {
    success:    Math.round(40+rng()*55),
    risk:       Math.round(20+rng()*70),
    casualties: Math.round(10+rng()*70),
    logistics:  Math.round(15+rng()*75),
    escalation: Math.round(10+rng()*80)
  };
}
function WargamingTab({ mission, units }) {
  const coas = mission.achMatrix?.coas || [];
  const nato  = coas.filter(c => c.side === "NATO");
  const opfor = coas.filter(c => c.side === "OPFOR");

  /* Pairwise matchup score: NATO success vs OPFOR escalation as a simple
     proxy. Positive = NATO favoured, negative = OPFOR. */
  const matchupScore = (nC, oC) => {
    const a = simulatedOutcome(nC), b = simulatedOutcome(oC);
    /* Heuristic: NATO wins points for higher success and lower own casualties;
       OPFOR wins points for higher escalation and lower own logistics burden. */
    const natoNet  = (a.success - a.casualties);
    const opforNet = (b.escalation - b.logistics);
    return natoNet - opforNet;
  };

  const cellColour = (s) => s >  20 ? "#7cd8a8" : s >  5 ? "#a4d989"
                          : s < -20 ? "#e85d50" : s < -5 ? "#ffb33a" : "#92a1bd";

  /* Best matchup per NATO CoA (the OPFOR CoA against which NATO does best) */
  const bestPerNato = nato.map(nC => {
    let best = null, bestScore = -Infinity;
    opfor.forEach(oC => {
      const s = matchupScore(nC, oC);
      if (s > bestScore) { bestScore = s; best = oC; }
    });
    return { nato:nC, best, bestScore };
  });
  /* Worst matchup per NATO CoA (where NATO is most exposed) */
  const worstPerNato = nato.map(nC => {
    let worst = null, worstScore = Infinity;
    opfor.forEach(oC => {
      const s = matchupScore(nC, oC);
      if (s < worstScore) { worstScore = s; worst = oC; }
    });
    return { nato:nC, worst, worstScore };
  });

  return (
    <section className="cfg-sec">
      <h4>WARGAMING · MULTI-COA MATCHUP MATRIX</h4>
      <p style={{fontSize:11.5,color:"var(--ink-dim)",lineHeight:1.55}}>
        Every NATO CoA is wargamed against every OPFOR CoA. Each cell shows the
        net score (NATO success minus own casualties, vs OPFOR escalation minus
        their logistics burden). Positive = NATO favoured, negative = OPFOR.
        Results are deterministic (same seed per CoA id) so you can re-open this
        tab and get the same numbers.
      </p>

      {nato.length === 0 || opfor.length === 0 ? (
        <p style={{color:"var(--ink-mute)",fontSize:11.5}}>Define at least one NATO and one OPFOR CoA in the ACH MATRIX tab first.</p>
      ) : (
        <>
          <div className="crud-wrap" style={{marginBottom:14}}>
            <table className="crud-table">
              <thead>
                <tr>
                  <th style={{minWidth:160}}>NATO CoA \\ OPFOR CoA</th>
                  {opfor.map(oC => <th key={oC.id} style={{minWidth:110}}>{oC.name}</th>)}
                </tr>
              </thead>
              <tbody>
                {nato.map(nC => (
                  <tr key={nC.id}>
                    <td style={{fontWeight:700,color:"var(--allied)"}}>{nC.name}</td>
                    {opfor.map(oC => {
                      const s = matchupScore(nC, oC);
                      return (
                        <td key={oC.id} className="mono"
                            style={{textAlign:"center",fontWeight:700,color:cellColour(s),background:"#06122a"}}>
                          {s >= 0 ? "+" : ""}{s}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <h4 style={{margin:"4px 0"}}>BEST / WORST MATCHUP PER NATO CoA</h4>
          <div className="crud-wrap">
            <table className="crud-table">
              <thead><tr><th>NATO CoA</th><th>BEST AGAINST</th><th>SCORE</th><th>WORST AGAINST</th><th>SCORE</th></tr></thead>
              <tbody>{bestPerNato.map((b,i) => {
                const w = worstPerNato[i];
                return (
                  <tr key={b.nato.id}>
                    <td style={{fontWeight:700,color:"var(--allied)"}}>{b.nato.name}</td>
                    <td>{b.best?.name||"—"}</td>
                    <td className="mono" style={{color:cellColour(b.bestScore)}}>{b.bestScore>=0?"+":""}{b.bestScore}</td>
                    <td>{w.worst?.name||"—"}</td>
                    <td className="mono" style={{color:cellColour(w.worstScore)}}>{w.worstScore>=0?"+":""}{w.worstScore}</td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
          <p style={{fontSize:11,color:"var(--ink-mute)",marginTop:8}}>
            Wargaming runs in-platform without any external simulator. Real-RL outcomes
            arrive with FM-04 (foundation-model integration); the seam is the
            <code>simulatedOutcome()</code> function.
          </p>
        </>
      )}
    </section>
  );
}

  const add = () => setMission(m => ({...m, personnelRecovery:{...(m.personnelRecovery||{}),

  const del = (id) => setMission(m => ({...m, personnelRecovery:{...m.personnelRecovery,

  return (

        Each isolated person (IP) advances through the stages via the ➤ button. Map fly-to and dossier integration
        will surface the IP next to the existing OOB markers.

            <tr key={i.id}>

function AnalyticsTab({ mission, setMission, units, coaHistory, pushLog }) {
  const events = useMemo(() => [...(mission.geopoliticalEvents||[]), ...(mission.intelEvents||[])], [mission]);
  const clusters = useMemo(() => correlateEvents(events), [events]);

  /* LD-01 — Live-feed adapter stub. Polls a URL every N seconds (default 30s)
     for a JSON of intel events and merges them. Disabled by default. */
  const [live, setLive] = useState(()=>{
    try { return JSON.parse(window.localStorage?.getItem("c23.live") || "{}"); } catch { return {}; }
  });
  const setLiveP = (k,v) => { const next = {...live, [k]:v};
    setLive(next); try { window.localStorage?.setItem("c23.live", JSON.stringify(next)); } catch {} };
  const liveTimerRef = useRef(null);
  const fetchOnce = useCallback(async () => {
    if (!live.url) return;
    try {
      const res = await fetch(live.url, { mode: "cors" });
      const data = await res.json();
      const arr = Array.isArray(data) ? data : (data.intelEvents||[]);
      if (arr.length) {
        setMission(m => ({...m, intelEvents:[...(m.intelEvents||[]), ...arr.map(e=>({...e,
          id: e.id || newId("live"), source: e.source || "LIVE-FEED" }))]}));
        pushLog?.("LIVE", `Pulled ${arr.length} events from ${live.url}.`, "info");
      }
    } catch (err) { pushLog?.("LIVE", `Adapter error: ${err.message}`, "warn"); }
  }, [live.url, setMission, pushLog]);
  useEffect(() => {
    if (liveTimerRef.current) { clearInterval(liveTimerRef.current); liveTimerRef.current = null; }
    if (live.enabled && live.url) {
      liveTimerRef.current = setInterval(fetchOnce, Math.max(5,(parseInt(live.intervalSec,10)||30))*1000);
    }
    return () => { if (liveTimerRef.current) clearInterval(liveTimerRef.current); };
  }, [live.enabled, live.url, live.intervalSec, fetchOnce]);

  /* WF-04 — Operations Assessment.
     For each LOO/LOE-tagged element (or aggregate), compute simple MoP (executions)
     and MoE (success% from CoA outcome simulator stub). */
  const opsAssessment = useMemo(() => {
    const rows = [];
    const coas = mission.achMatrix?.coas || [];
    coas.forEach(c => {
      const executions = coaHistory.filter(t => t.coaId === c.id).length;
      let h = 0; for (const ch of c.id) h = (h*31 + ch.charCodeAt(0)) & 0xffff;
      const moeSuccess = 40 + (h % 56);
      rows.push({ coa:c.name, side:c.side, mop:executions, moeSuccess });
    });
    return rows;
  }, [mission.achMatrix, coaHistory]);

  return (
    <section className="cfg-sec">
      <h4>ANALYTICS · CORRELATION · CASCADES · LIVE-FEED · OPS ASSESSMENT</h4>

      {/* AN-01 */}
      <div className="io-card">
        <h4>EVENT CORRELATION (AN-01)</h4>
        <p className="io-blurb">Clusters all geopolitical + intel events by shared (source × top-keyword) pair. Surfaces clusters with 2 or more members. A future ML correlation engine plugs in the same place.</p>
        {clusters.length===0 ? <p style={{color:"var(--ink-mute)",fontSize:11.5}}>No correlated clusters detected.</p>
          : <div className="crud-wrap" style={{maxHeight:"22vh"}}>
              <table className="crud-table">
                <thead><tr><th>CLUSTER (source::keyword)</th><th>COUNT</th><th>SEV</th><th>EVENTS</th></tr></thead>
                <tbody>{clusters.map(c => (
                  <tr key={c.key}>
                    <td className="mono">{c.key}</td>
                    <td className="mono">{c.count}</td>
                    <td><span className={`status-pill st-${c.severity==="alert"?"destroyed":c.severity==="warn"?"engaging":"operational"}`}>{c.severity}</span></td>
                    <td style={{fontSize:11}}>{c.events.map(e=>e.id).join(", ")}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>}
      </div>

      {/* AN-03 — v010: each cascade now cites its AJP rule */}
      <div className="io-card">
        <h4>2nd / 3rd-ORDER CASCADES (AN-03) · doctrine-tagged (v010)</h4>
        <p className="io-blurb">Cascading effects per CoA driven by <code>mission.cascadeRules[]</code> (each rule cites its AJP). Add or edit rules below; they take effect immediately.</p>
        <div className="crud-wrap" style={{maxHeight:"30vh", marginBottom:10}}>
          <table className="crud-table">
            <thead><tr><th>CoA</th><th>ORD</th><th>DOM</th><th>AJP</th><th>EFFECT</th></tr></thead>
            <tbody>{(mission.achMatrix?.coas||[]).flatMap(c =>
              cascadeEffects(c, mission).map((eff,i) => (
                <tr key={`${c.id}-${i}`} className={`side-${c.side}`}>
                  <td>{i===0 ? <b>{c.name}</b> : <span style={{color:"var(--ink-mute)"}}>↳</span>}</td>
                  <td className="mono">{eff.order}</td>
                  <td className="mono">{eff.dom}</td>
                  <td className="mono" style={{color:"var(--nato-gold)"}}>{eff.ajp||"—"}</td>
                  <td>{eff.txt}</td>
                </tr>
              )))}</tbody>
          </table>
        </div>
        {/* v010 — CASCADE RULES editor */}
        <CascadeRulesEditor mission={mission} setMission={setMission}/>
      </div>

      {/* LD-01 */}
      <div className="io-card">
        <h4>LIVE-FEED ADAPTER (LD-01) · STUB</h4>
        <p className="io-blurb">Polls a URL for an array of intel events; appends them to the mission. Subject to CORS — set up the source endpoint accordingly. Persisted in <code>localStorage</code> key <code>c23.live</code>.</p>
        <div className="form-grid">
          <Field label="Endpoint URL" full>
            <input value={live.url||""} onChange={e=>setLiveP("url",e.target.value)}
              placeholder="https://feeds.local/isr/intel.json"/>
          </Field>
          <Field label="Polling interval (sec)">
            <input type="number" min="5" value={live.intervalSec||30} onChange={e=>setLiveP("intervalSec",e.target.value)}/>
          </Field>
          <Field label="Adapter state">
            <select value={live.enabled?"on":"off"} onChange={e=>setLiveP("enabled",e.target.value==="on")}>
              <option value="off">OFF</option><option value="on">ON</option>
            </select>
          </Field>
          <Field label="(diagnostics)"><input disabled value={live.enabled?`polling every ${live.intervalSec||30}s`:"idle"}/></Field>
        </div>
        <div style={{marginTop:8,display:"flex",gap:6}}>
          <button className="btn-edit btn-sm" onClick={fetchOnce}>FETCH NOW</button>
        </div>
      </div>

      {/* WF-04 — v010: bucket by LOO when CoAs carry loo[] tags */}
      <div className="io-card">
        <h4>OPERATIONS ASSESSMENT (WF-04) · per LOO/LOE (v010)</h4>
        <p className="io-blurb">Per-CoA Measure of Performance (MoP, executions to date) and Measure of Effectiveness (MoE, success-probability stub). v010 buckets results by Line of Operation (AJP-3 / 5) when CoAs carry <code>loo[]</code> tags; CoAs without tags fall under "(unbucketed)".</p>
        {/* Per-LOO roll-up */}
        {(()=>{
          const byLoo = new Map();
          opsAssessment.forEach(r => {
            const coa = (mission.achMatrix?.coas||[]).find(c => c.name === r.coa);
            const loos = (coa?.loo && coa.loo.length) ? coa.loo : ["(unbucketed)"];
            loos.forEach(l => {
              if (!byLoo.has(l)) byLoo.set(l, []);
              byLoo.get(l).push(r);
            });
          });
          return [...byLoo.entries()].map(([loo, rows]) => {
            const totalMop  = rows.reduce((s,r)=>s+r.mop, 0);
            const avgMoe    = Math.round(rows.reduce((s,r)=>s+r.moeSuccess, 0) / rows.length);
            return (
              <div key={loo} style={{marginBottom:10}}>
                <div style={{fontSize:11,letterSpacing:"0.16em",color:"var(--nato-gold)",fontWeight:700,marginBottom:4}}>
                  {loo} <span style={{color:"var(--ink-mute)"}}>· total MoP {totalMop} · avg MoE {avgMoe}%</span>
                </div>
                <div className="crud-wrap">
                  <table className="crud-table">
                    <thead><tr><th>CoA</th><th>SIDE</th><th>LOE</th><th>MoP</th><th>MoE</th></tr></thead>
                    <tbody>{rows.map(r => {
                      const coa = (mission.achMatrix?.coas||[]).find(c => c.name === r.coa);
                      return (
                        <tr key={`${loo}-${r.coa}`} className={`side-${r.side}`}>
                          <td>{r.coa}</td>
                          <td><span className={`pill side-${r.side}`}>{r.side}</span></td>
                          <td style={{fontSize:10.5,color:"var(--ink-dim)"}}>{(coa?.loe||[]).join(" · ")||"—"}</td>
                          <td className="mono">{r.mop}</td>
                          <td className="mono">{r.moeSuccess}%</td>
                        </tr>
                      );
                    })}</tbody>
                  </table>
                </div>
              </div>
            );
          });
        })()}
      </div>
    </section>
  );
}

/* ────────────────────────────────────────────────────────────────────
   v008 — Intel Ops tab (Cubo B easy):
   - AN-02 — generalised anomaly detection across AIS / OOB / events / JPTL
   - LD-02 — adversary-behaviour replay (load a JSON of past behaviour and
     append entries to intelEvents)
   - WF-05 — AAR (After-Action Review) formaliser exporting structured JSON
   - CO-02 — multi-HQ filter (SHAPE / JFC-BAL / TCC-N / TCC-S — sample HQs)
   ──────────────────────────────────────────────────────────────────── */
const C23_HQS = [
  { id:"shape",   name:"SHAPE",   bbox:null /* whole AOR */ },
  { id:"jfc-bal", name:"JFC-BAL", bbox:[53,17,60,31] },
  { id:"tcc-n",   name:"TCC-N (Estonia/Latvia/Finland)", bbox:[57,21,60.5,29] },
  { id:"tcc-s",   name:"TCC-S (Lithuania/Poland)",       bbox:[52,17,57,26] }
];
function detectAnomalies({ mission, units, coaHistory }) {
  const A = [];
  /* AIS rules */
  (mission.aisFeed?.DATA||[]).forEach(v => {
    const dest = (v.DESTINATION||"").toUpperCase();
    if (dest.includes("AIS OFF"))       A.push({severity:"alert", source:"AIS",    text:`${v.SHIPNAME} reports DESTINATION="AIS OFF" (dark-AIS pattern).`});
    if (v.FLAG==="RU" && parseFloat(v.SPEED||"0") < 4)
      A.push({severity:"warn",  source:"AIS",    text:`${v.SHIPNAME} (RU flag) loitering at ${v.SPEED} kn near ${v.LAST_PORT||"unknown port"}.`});
  });
  /* OOB rules */
  units.forEach(u => {
    if ((u.status||"").toLowerCase()==="disrupted") A.push({severity:"warn",source:"OOB",text:`Unit ${u.id} (${u.designation}) reported DISRUPTED.`});
    if ((u.readiness||"R3")==="R4")                A.push({severity:"warn",source:"OOB",text:`Unit ${u.id} at low readiness (R4).`});
  });
  /* JPTL rules */
  (mission.jointTargeting?.jptl||[]).forEach(t => {
    if (t.category==="TST" && parseInt(t.cde||"0",10) >= 4)
      A.push({severity:"alert", source:"JPTL", text:`TST "${t.name}" carries a high CDE rating (${t.cde}).`});
  });
  /* Posture interactions */
  if ((mission.posture?.pnt||"")==="Denied" && (mission.posture?.cisPace||"P")==="P")
    A.push({severity:"alert", source:"FUSION", text:`PNT denied while still on Primary CIS — fall back to Alternate (CIS PACE).`});
  if ((mission.posture?.cbrn||"Green")==="Red" && (mission.posture?.fpcon||"Alpha")!=="Delta")
    A.push({severity:"alert", source:"FUSION", text:`CBRN RED but FPCON not at Delta — escalate force protection.`});
  /* CoA history rules */
  if (coaHistory.length === 0) A.push({severity:"info", source:"AAR", text:"No turns played yet — wargame is at baseline."});
  return A;
}
function IntelOpsTab({ mission, setMission, units, coaHistory }) {
  const [hq, setHq] = useState("shape");
  const [aarText, setAarText] = useState("");
  const replayRef = useRef(null);

  const anomalies = useMemo(() => detectAnomalies({ mission, units, coaHistory }),
    [mission, units, coaHistory]);
  const currentHq = C23_HQS.find(h=>h.id===hq) || C23_HQS[0];
  const inBox = (u) => {
    if (!currentHq.bbox) return true;
    const [s,w,n,e] = currentHq.bbox;
    return u.coordinates && u.coordinates.lat>=s && u.coordinates.lat<=n && u.coordinates.lng>=w && u.coordinates.lng<=e;
  };
  const scoped = units.filter(inBox);
  const scopedTally = useMemo(() => {
    const t = { NATO:0, OPFOR:0, NEUTRAL:0 };
    scoped.forEach(u => { if (t[u.side]!==undefined) t[u.side]++; });
    return t;
  }, [scoped]);

  /* LD-02 — adversary behaviour replay (load JSON, append intel events) */
  const onReplay = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const arr = Array.isArray(data) ? data : (Array.isArray(data.intelEvents) ? data.intelEvents : null);
        if (!arr) { window.alert("Expected an array, or { intelEvents: [...] }"); return; }
        setMission(m => ({...m, intelEvents:[...(m.intelEvents||[]), ...arr.map(ev => ({...ev,
          id: ev.id || newId("rep"),
          source: ev.source || "REPLAY"
        }))]}));
        window.alert(`Replay: appended ${arr.length} intel events from "${f.name}".`);
      } catch (err) { window.alert("Parse error: "+err.message); }
    };
    r.readAsText(f);
  };

  /* WF-05 — AAR formaliser */
  const generateAAR = () => {
    const m = mission.mission||{};
    const lines = [];
    lines.push(`# AFTER-ACTION REVIEW`);
    lines.push(`Mission: ${m.name||"—"}  ·  Operation: ${m.code||"—"}`);
    lines.push(`AAR DTG: ${dtgFmt(new Date().toISOString())}`);
    lines.push("");
    lines.push("## What was the mission?");
    lines.push(`> ${m.intent||"—"}`);
    lines.push("");
    lines.push("## What actually happened?");
    if (coaHistory.length === 0) lines.push("(no turns played)");
    else coaHistory.slice().reverse().forEach((t,i) =>
      lines.push(`${i+1}. **${t.faction}** executed *${t.coaName}* (phase ${t.phase}, ${t.mode}) at ${dtgFmt(t.ts)}.`));
    lines.push("");
    lines.push("## What went well? (sustain)");
    lines.push("- (analyst input)");
    lines.push("");
    lines.push("## What did not go well? (improve)");
    lines.push("- (analyst input)");
    lines.push("");
    lines.push("## Anomalies detected at AAR time");
    anomalies.forEach(a => lines.push(`- [${a.severity.toUpperCase()}] ${a.source}: ${a.text}`));
    lines.push("");
    lines.push("## Recommendations");
    lines.push("- (analyst input)");
    lines.push("");
    lines.push("---");
    lines.push("*Generated by C23 DIANA NATO Warfighters · WF-05 AAR formaliser (v008).*");
    setAarText(lines.join("\n"));
  };
  const downloadAAR = () => {
    if (!aarText) generateAAR();
    const text = aarText || "(empty AAR — click GENERATE first)";
    const blob = new Blob([text],{type:"text/markdown"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url;
    a.download = `AAR_${(mission.mission?.code||"OP").replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.md`;
    a.click(); URL.revokeObjectURL(url);
  };

  return (
    <section className="cfg-sec">
      <h4>INTEL OPS · ANOMALY DETECTION · REPLAY · AAR · MULTI-HQ</h4>

      {/* AN-02 */}
      <div className="io-card">
        <h4>ANOMALY DETECTION (AN-02)</h4>
        <p className="io-blurb">Pluggable rule set. Currently checks AIS dark-pattern + low-speed loitering, OOB disrupted/low-readiness units, JPTL high-CDE TSTs, and posture interactions (PNT/CIS PACE, CBRN/FPCON). Re-evaluates on every render.</p>
        {anomalies.length===0 ? <p style={{color:"var(--ink-mute)",fontSize:11.5}}>No anomalies at this time.</p>
          : <ul style={{fontSize:11.5,color:"var(--ink-dim)",lineHeight:1.6,margin:"4px 0 0 18px"}}>
              {anomalies.map((a,i) => (
                <li key={i}>
                  <span style={{color:a.severity==="alert"?"var(--hostile)":a.severity==="warn"?"#ffb33a":"var(--mint)",fontWeight:700}}>
                    [{a.source}]</span> {a.text}
                </li>
              ))}
            </ul>}
      </div>

      {/* LD-02 */}
      <div className="io-card">
        <h4>ADVERSARY-BEHAVIOUR REPLAY (LD-02)</h4>
        <p className="io-blurb">Load a JSON file containing an array of intel events (or {`{ intelEvents:[…] }`}); they are appended to <code>mission.intelEvents</code> with a REPLAY source tag if missing. Useful for replaying historical opposition patterns against the current OOB/JPTL.</p>
        <input ref={replayRef} type="file" accept=".json" onChange={onReplay} className="io-file"/>
      </div>

      {/* CO-02 */}
      <div className="io-card">
        <h4>MULTI-HQ VIEW (CO-02)</h4>
        <p className="io-blurb">Scope unit counts to a HQ's AOR bounding box. SHAPE = whole AOR; sub-HQs cover Baltic / North-Baltics / South-Baltics.</p>
        <div className="seg" style={{flexWrap:"wrap"}}>
          {C23_HQS.map(h => (
            <button key={h.id} className={`seg-b ${hq===h.id?"on":""}`} onClick={()=>setHq(h.id)}>{h.name}</button>
          ))}
        </div>
        <p style={{marginTop:8,fontSize:11.5,color:"var(--ink)"}}>
          <b>{currentHq.name}</b> · NATO {scopedTally.NATO} · OPFOR {scopedTally.OPFOR} · NEUTRAL {scopedTally.NEUTRAL} · TOTAL {scoped.length}
        </p>
      </div>

      {/* WF-05 */}
      <div className="io-card">
        <h4>AFTER-ACTION REVIEW (WF-05)</h4>
        <p className="io-blurb">Generate a structured AAR Markdown from the executed turn history + current anomalies; analyst fills "what went well / improve / recommendations" and exports.</p>
        <div style={{display:"flex",gap:6,marginBottom:6}}>
          <button className="btn-create" onClick={generateAAR}>⚙ GENERATE</button>
          <button className="btn-edit btn-sm" onClick={downloadAAR}>⬇ DOWNLOAD .md</button>
        </div>
        <textarea value={aarText} onChange={e=>setAarText(e.target.value)} rows={14}
          placeholder="Click GENERATE to populate the AAR template; edit freely; then DOWNLOAD."
          style={{width:"100%",background:"#06122a",color:"var(--ink)",border:"1px solid var(--line-2)",
            borderRadius:3,padding:10,fontSize:11.5,fontFamily:'"JetBrains Mono",monospace',lineHeight:1.55}}/>
      </div>
    </section>
  );
}

/* ────────────────────────────────────────────────────────────────────
   v006 — Workspace tab (Cubo C):
   - localStorage status indicator + manual save/clear
   - Multi-mission slots (save/load up to 5 named slots in localStorage)
   - Print one-pager
   - i18n stub (ES/EN/FR labels — applies to a subset of headers)
   ──────────────────────────────────────────────────────────────────── */
const C23_LANGS = {
  en: { hello:"WORKSPACE", slots:"MISSION SLOTS", print:"PRINT ONE-PAGER", lang:"LANGUAGE", persist:"BROWSER STORAGE" },
  es: { hello:"ESPACIO DE TRABAJO", slots:"FICHAS DE MISIÓN", print:"IMPRIMIR FICHA", lang:"IDIOMA", persist:"ALMACÉN DEL NAVEGADOR" },
  fr: { hello:"ESPACE DE TRAVAIL", slots:"FICHES DE MISSION", print:"IMPRIMER FICHE", lang:"LANGUE", persist:"STOCKAGE NAVIGATEUR" }
};
function WorkspaceTab({ mission, setMission }) {
  const [lang, setLang] = useState(()=> { try { return window.localStorage?.getItem("c23.lang") || "en"; } catch { return "en"; } });
  const t = C23_LANGS[lang] || C23_LANGS.en;
  const setLangPersist = (l) => { setLang(l); try { window.localStorage?.setItem("c23.lang", l); } catch {} };

  const [slots, setSlots] = useState(()=>{
    try { return JSON.parse(window.localStorage?.getItem("c23.slots") || "[]"); } catch { return []; }
  });
  const persistSlots = (next) => {
    setSlots(next);
    try { window.localStorage?.setItem("c23.slots", JSON.stringify(next)); } catch {}
  };
  const saveSlot = () => {
    const name = window.prompt("Slot name (e.g. 'BALTIC SENTRY · v1'):");
    if (!name) return;
    const entry = { id:newId("slot"), name, savedAt:new Date().toISOString(),
      mission:JSON.parse(JSON.stringify(mission)) };
    const next = [entry, ...slots].slice(0,5);
    persistSlots(next);
  };
  const loadSlot = (s) => {
    if (!window.confirm(`Load "${s.name}"? Current mission edits will be replaced.`)) return;
    setMission(s.mission);
  };
  const delSlot = (s) => {
    if (!window.confirm(`Delete slot "${s.name}"?`)) return;
    persistSlots(slots.filter(x => x.id !== s.id));
  };
  const clearAllStorage = () => {
    if (!window.confirm("Clear all C23 browser storage? Current edits and slots will be lost.")) return;
    try { ["c23.mission","c23.units","c23.slots","c23.lang"].forEach(k=>window.localStorage?.removeItem(k)); } catch {}
    window.alert("Browser storage cleared. Reload the page.");
  };
  const doPrint = () => window.print();

  const storageBytes = (() => {
    try {
      let s = 0;
      ["c23.mission","c23.units","c23.slots"].forEach(k => { s += (window.localStorage?.getItem(k)||"").length; });
      return s;
    } catch { return 0; }
  })();

  return (
    <section className="cfg-sec">
      <h4>{t.hello}</h4>

      <div className="io-card">
        <h4>{t.persist}</h4>
        <p className="io-blurb">
          Mission and OOB are auto-saved to <code>localStorage</code> on every edit
          (keys <code>c23.mission</code>, <code>c23.units</code>, <code>c23.slots</code>, <code>c23.lang</code>).
          Currently using <b>{storageBytes.toLocaleString()} bytes</b>.
        </p>
        <button className="btn-danger" onClick={clearAllStorage}>↺ CLEAR ALL STORAGE</button>
      </div>

      <div className="io-card">
        <h4>{t.slots}</h4>
        <p className="io-blurb">Save up to 5 named snapshots of the current mission inside the browser. Useful for A/B comparison without leaving the platform.</p>
        <button className="btn-create" onClick={saveSlot}>+ SAVE CURRENT MISSION TO A SLOT</button>
        {slots.length > 0 && (
          <div className="crud-wrap" style={{marginTop:10}}>
            <table className="crud-table">
              <thead><tr><th>NAME</th><th>SAVED</th><th>MISSION</th><th></th></tr></thead>
              <tbody>{slots.map(s => (
                <tr key={s.id}>
                  <td>{s.name}</td>
                  <td className="mono">{s.savedAt.slice(0,16).replace("T"," ")}Z</td>
                  <td>{s.mission?.mission?.name || "—"}</td>
                  <td>
                    <button className="btn-edit btn-sm" onClick={()=>loadSlot(s)}>LOAD</button>
                    <button className="btn-del btn-sm"  onClick={()=>delSlot(s)}>DEL</button>
                  </td>
                </tr>))}</tbody>
            </table>
          </div>
        )}
      </div>

      <div className="io-card">
        <h4>{t.print}</h4>
        <p className="io-blurb">
          Opens the browser print dialog. The page CSS produces a one-pager suitable for SCIF distribution.
          The Command Log and modals are hidden in print; the COP, mission identity and posture stay.
        </p>
        <button className="btn-create" onClick={doPrint}>🖨 {t.print}</button>
      </div>

      <div className="io-card">
        <h4>{t.lang}</h4>
        <p className="io-blurb">Stub for in-platform localisation (Cubo C). Currently swaps a small set of WORKSPACE labels.</p>
        <div className="seg">
          {Object.keys(C23_LANGS).map(l => (
            <button key={l} className={`seg-b ${lang===l?"on":""}`} onClick={()=>setLangPersist(l)}>{l.toUpperCase()}</button>
          ))}
        </div>
      </div>

      <div className="io-card">
        <h4>HOTKEYS</h4>
        <ul style={{fontSize:11.5,color:"var(--ink-dim)",lineHeight:1.7,margin:"6px 0 0 18px"}}>
          <li><code>I</code> · open INFO modal &nbsp;·&nbsp; <code>?</code> · toggle INFO</li>
          <li><code>C</code> · open CONFIG &nbsp;·&nbsp; <code>Esc</code> · close any modal</li>
          <li><code>T</code> · TURN (flip Allied/Hostile)</li>
          <li><code>A</code> · toggle AUTO mode</li>
          <li><code>R</code> · RESET OP</li>
          <li><code>1</code>…<code>9</code> · execute that phase if eligible</li>
          <li><code>+</code> / <code>-</code> · expand / collapse all rail sections</li>
          <li><code>Ctrl/Cmd Z</code> · undo &nbsp;·&nbsp; <code>Ctrl/Cmd Shift Z</code> or <code>Ctrl Y</code> · redo</li>
        </ul>
      </div>
    </section>
  );
}

/* ────────────────────────────────────────────────────────────────────
   v005 — Weather tab (LD-03) — first-class environmental feed
   ──────────────────────────────────────────────────────────────────── */

    forecast:(m.weather?.forecast||[]).map(r=>r.id===id?{...r,[k]:["windKn","seaState","vizKm","cloudOkta"].includes(k)?parseFloat(v):v}:r)}}));

    forecast:[...(m.weather?.forecast||[]), { id:newId("w"), region:"New region",
      validFrom:new Date().toISOString(), validTo:new Date(Date.now()+18*3600*1000).toISOString(),
      state:"Clear", windKn:10, seaState:1, vizKm:15, cloudOkta:2, notes:"" }]}}));
  const del = (id) => setMission(m => ({...m, weather:{...m.weather,

          </select>
        </Field>

      <div className="crud-wrap">
        <table className="crud-table">
          <thead><tr><th>ID</th><th>REGION</th><th>STATE</th><th>WIND kn</th><th>SS</th><th>VIZ km</th><th>OKTA</th><th>FROM (ISO)</th><th>TO (ISO)</th><th>NOTES</th><th></th></tr></thead>
          <tbody>{(wx.forecast||[]).map(r=>(
            <tr key={r.id}>
              <td className="mono">{r.id}</td>
              <td><input className="ach-cell-edit" value={r.region||""} onChange={e=>updRow(r.id,"region",e.target.value)}/></td>
              <td>
                <select className="ach-cell-edit" value={r.state} onChange={e=>updRow(r.id,"state",e.target.value)}>
                  <option>Clear</option><option>Marginal</option><option>Adverse</option><option>Severe</option>
                </select>
              </td>
              <td style={{width:60}}><input className="ach-cell-edit" type="number" value={r.windKn} onChange={e=>updRow(r.id,"windKn",e.target.value)}/></td>

              <td style={{width:60}}><input className="ach-cell-edit" type="number" value={r.vizKm} onChange={e=>updRow(r.id,"vizKm",e.target.value)}/></td>
              <td style={{width:50}}><input className="ach-cell-edit" type="number" min="0" max="8" value={r.cloudOkta} onChange={e=>updRow(r.id,"cloudOkta",e.target.value)}/></td>
              <td style={{minWidth:170}}><input className="ach-cell-edit" value={r.validFrom||""} onChange={e=>updRow(r.id,"validFrom",e.target.value)}/></td>
              <td style={{minWidth:170}}><input className="ach-cell-edit" value={r.validTo||""}   onChange={e=>updRow(r.id,"validTo",  e.target.value)}/></td>
              <td><input className="ach-cell-edit" value={r.notes||""} onChange={e=>updRow(r.id,"notes",e.target.value)}/></td>

      <p style={{fontSize:11.5,color:"var(--ink-mute)",marginTop:8,lineHeight:1.55}}>
        SS = Sea State (Douglas, 0-9). OKTA = sky cover (0-8). The overall state colours the WX tile on the top bar
        (Clear · Marginal · Adverse · Severe).

  );
}

/* ────────────────────────────────────────────────────────────────────
   v005 — Orders tab (WF-03) — STANAG-2014-shaped OPORD/FRAGO generator
   ──────────────────────────────────────────────────────────────────── */
function OrdersTab({ mission, units, coaHistory }) {
  const m = mission.mission || {};
  const phases = mission.phases || [];
  const wx = mission.weather || {};
  const turnsByFaction = (f) => coaHistory.filter(t => t.faction === f);
  const orderText = useMemo(() => {
    const lines = [];
    lines.push(`# OPORD ${m.code||"OP UNNAMED"} — ${m.name||""}`);
    lines.push(`Issued by: ${m.commander||"—"}`);
    lines.push(`DTG: ${dtgFmt(new Date().toISOString())}`);
    lines.push("");
    lines.push("## 1. SITUATION");
    lines.push(`AOR: ${m.aor||"—"}`);
    lines.push(`Operation Type: ${m.operationType||"—"} · Mission Type: ${m.missionType||"—"}`);
    lines.push(`Adversary CoG: ${m.cog?.adversary||"—"}`);
    lines.push(`Friendly  CoG: ${m.cog?.friendly||"—"}`);
    lines.push(`Weather (overall): ${wx.overall||"—"}`);
    (wx.forecast||[]).forEach(w => lines.push(`  - ${w.region}: ${w.state} · wind ${w.windKn}kn · SS ${w.seaState} · viz ${w.vizKm}km · ${w.notes||""}`));
    lines.push("");
    lines.push("## 2. MISSION");
    lines.push(`> ${m.intent||"—"}`);
    lines.push("");
    lines.push("## 3. EXECUTION");
    lines.push("### 3.a Concept of Operations");
    phases.forEach(p => lines.push(`- **${p.code} (${p.name})** — ${p.blurb||""} (REL ${p.relDays>=0?"+":""}${p.relDays}d, ABS ${(p.absISO||"").slice(0,10)})`));
    lines.push("### 3.b Tasks to subordinate units");
    units.forEach(u => lines.push(`- **${u.id} — ${u.designation}** (${u.side}/${u.domain}/${u.echelon||""}): ${u.mission||""}`));
    lines.push("### 3.c Coordinating Instructions");
    lines.push(`- FPCON: ${mission.posture?.fpcon||"—"} · CBRN: ${mission.posture?.cbrn||"—"} · PNT: ${mission.posture?.pnt||"—"} · CIS PACE: ${mission.posture?.cisPace||"—"}`);
    lines.push("");
    lines.push("## 4. SUSTAINMENT");
    (mission.movement?.apods||[]).forEach(p => lines.push(`- APOD ${p.name} (${p.nation}) · ${p.status}`));
    (mission.movement?.spods||[]).forEach(p => lines.push(`- SPOD ${p.name} (${p.nation}) · ${p.status}`));
    (mission.movement?.msrs ||[]).forEach(r => lines.push(`- MSR ${r.name} · ${r.status}`));
    (mission.movement?.asrs ||[]).forEach(r => lines.push(`- ASR ${r.name} · ${r.status}`));
    lines.push("");
    lines.push("## 5. COMMAND AND SIGNAL");
    lines.push(`Commander: ${m.commander||"—"}`);
    lines.push(`Master Narrative: ${m.masterNarrative||"—"}`);
    lines.push("");
    lines.push("## ANNEX A — JOINT TARGETING (AJP-3.9)");
    (mission.jointTargeting?.jptl||[]).forEach(t =>
      lines.push(`- **${t.category} P${t.priority}** ${t.name} · F2T2EA ${t.f2t2ea} · CDE ${t.cde} · ${t.intent||""}` +
                 (t.restrictions ? ` · Restr: ${t.restrictions}` : "")));
    lines.push("");
    lines.push("## ANNEX B — TURN HISTORY (CoA execution)");
    if (coaHistory.length === 0) lines.push("- (no turns played yet)");
    else coaHistory.slice(0,40).forEach(t =>
      lines.push(`- ${dtgFmt(t.ts)} · phase ${t.phase} · ${t.faction} · ${t.mode} · ${t.coaName}`));
    lines.push("");
    lines.push("---");
    lines.push("*Generated by C23 DIANA NATO Warfighters · OPORD generator v005 · STANAG 2014 shape.*");
    return lines.join("\n");
  }, [m, mission, units, phases, coaHistory, wx]);

  const download = () => {
    const blob = new Blob([orderText], {type:"text/markdown"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url;
    a.download = `OPORD_${(m.code||"OP").replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.md`;
    a.click(); URL.revokeObjectURL(url);
  };
  return (
    <section className="cfg-sec">
      <div className="oob-toolbar">
        <h4 style={{margin:0}}>OPORD / FRAGO GENERATOR · STANAG 2014</h4>
        <span className="oob-count mono">{(coaHistory||[]).length} TURNS · {(mission.jointTargeting?.jptl||[]).length} JPTL</span>
        <button className="btn-create" onClick={download}>⬇ DOWNLOAD .md</button>
      </div>
      <p style={{fontSize:11.5,color:"var(--ink-dim)",lineHeight:1.55}}>
        Compiles a STANAG-2014-shaped operations order from current mission state + executed turn history.
        Section 1 Situation · 2 Mission · 3 Execution · 4 Sustainment · 5 C2 + JPTL Annex + Turn-History Annex.
        Re-generated on every render — what you see is what downloads.
      </p>
      <pre style={{background:"#06122a",border:"1px solid var(--line)",borderRadius:3,padding:12,
        fontSize:11.5,fontFamily:'"JetBrains Mono",monospace',color:"var(--ink)",
        maxHeight:"50vh",overflow:"auto",whiteSpace:"pre-wrap",lineHeight:1.55}}>{orderText}</pre>
      <p style={{fontSize:11,color:"var(--ink-mute)",marginTop:8}}>
        NATO turns: {turnsByFaction("NATO").length} · OPFOR turns: {turnsByFaction("OPFOR").length} · NEUTRAL turns: {turnsByFaction("NEUTRAL").length}
      </p>
    </section>
  );
}

/* ────────────────────────────────────────────────────────────────────
   v005 — Roll-up tab (CO-01) — Tactical → Operational → Strategic by echelon
   ──────────────────────────────────────────────────────────────────── */
const ECHELON_TIER = (e) => {
  const tac = ["BG","BCT","BDE","DET","REGT","FFG","SSK","MCM","FSG","CELL","FLT","FERRY","LHD"];
  const opn = ["DIV"];
  const str = ["CORPS","ARMY"];
  const x = (e||"").toUpperCase();
  if (str.includes(x)) return "Strategic";
  if (opn.includes(x)) return "Operational";
  if (tac.includes(x)) return "Tactical";
  return "Tactical";
};
function RollUpTab({ mission, units, coaHistory }) {
  const tiers = ["Tactical","Operational","Strategic"];
  const grid = useMemo(() => {
    const g = {};
    tiers.forEach(t => g[t] = { NATO:[], OPFOR:[], NEUTRAL:[] });
    units.forEach(u => { const t = ECHELON_TIER(u.echelon); if (g[t][u.side]) g[t][u.side].push(u); });
    return g;
  }, [units]);
  const turnsByTier = useMemo(() => {
    const r = { Tactical:0, Operational:0, Strategic:0 };
    coaHistory.forEach(t => {
      const c = (mission.achMatrix?.coas||[]).find(x=>x.id===t.coaId);
      if (!c) return;
      /* CoA tier inferred from unit-level granularity in description: keep simple — count all */
      r.Tactical++;
    });
    return r;
  }, [coaHistory, mission.achMatrix]);

  return (
    <section className="cfg-sec">
      <h4>ECHELON ROLL-UP · TACTICAL → OPERATIONAL → STRATEGIC</h4>
      <p style={{fontSize:11.5,color:"var(--ink-dim)"}}>
        Tactical tier: BG / BCT / BDE / DET / REGT / FFG / SSK / MCM / FSG / CELL / FLT / FERRY / LHD.
        Operational tier: DIV. Strategic tier: CORPS / ARMY. Override per-unit by editing OOB → Echelon.
      </p>
      <div className="crud-wrap" style={{marginBottom:14}}>
        <table className="crud-table">
          <thead><tr><th>TIER</th><th>NATO</th><th>OPFOR</th><th>NEUTRAL</th><th>TOTAL</th></tr></thead>
          <tbody>{tiers.map(t => {
            const n = grid[t].NATO.length, o = grid[t].OPFOR.length, x = grid[t].NEUTRAL.length;
            return (
              <tr key={t}>
                <td><b style={{color:"var(--nato-gold)"}}>{t}</b></td>
                <td className="mono" style={{color:"var(--allied)"}}>{n}</td>
                <td className="mono" style={{color:"var(--hostile)"}}>{o}</td>
                <td className="mono" style={{color:"var(--neutral)"}}>{x}</td>
                <td className="mono">{n+o+x}</td>
              </tr>
            );
          })}</tbody>
        </table>
      </div>
      {tiers.map(t => (
        <div key={t} style={{marginBottom:12}}>
          <h4 style={{margin:"4px 0"}}>{t.toUpperCase()} — UNITS</h4>
          <div className="crud-wrap" style={{maxHeight:"22vh"}}>
            <table className="crud-table">
              <thead><tr><th>SIDE</th><th>ID</th><th>DOM</th><th>DESIGNATION</th><th>ECHELON</th><th>STATUS</th></tr></thead>
              <tbody>{["NATO","OPFOR","NEUTRAL"].flatMap(s => grid[t][s].map(u => (
                <tr key={u.id} className={`side-${u.side}`}>
                  <td><span className={`pill side-${u.side}`}>{u.side}</span></td>
                  <td className="mono">{u.id}</td>
                  <td className="mono">{u.domain}</td>
                  <td>{u.designation}</td>
                  <td className="mono">{u.echelon||"—"}</td>
                  <td><span className={`status-pill st-${(u.status||"operational").toLowerCase()}`}>{u.status||"—"}</span></td>
                </tr>
              )))}</tbody>
            </table>
          </div>
        </div>
      ))}
      <p style={{fontSize:11,color:"var(--ink-mute)"}}>
        Turn-history aggregate (all tiers): {coaHistory.length} CoAs executed.
      </p>
    </section>
  );
}

                </ul>}
          </section>
          <p style={{fontSize:11,color:"var(--ink-mute)",fontStyle:"italic",marginTop:14}}>
            By authorising you confirm that the engagement is consistent with current Rules of Engagement,
            no RTL/NSL violations are foreseen, and the CDE rating is acceptable for this CoA.
          </p>
        </div>
        <div style={{display:"flex",gap:10,padding:"12px 18px",borderTop:"1px solid var(--line)",background:"#06122a"}}>
          <button className="btn-create" onClick={onConfirm}>✓ AUTHORISE &amp; EXECUTE</button>
          <button className="btn-danger"  onClick={onCancel}>✕ DENY</button>
        </div>
      </div>
    </div>
  );
}

function InfoModal({ onClose, mission }) {
  const [tab, setTab] = useState("instructions");
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal modal-wide" onClick={e=>e.stopPropagation()}>
        <header className="modal-head">
          <div>
            <div className="modal-title">PLATFORM INFO · INSTRUCTIONS & ACRONYMS</div>
            <div className="modal-sub mono">C23 DIANA NATO Warfighters · Air-Gapped</div>
          </div>
          <button className="modal-x" onClick={onClose}>×</button>
        </header>
        <div className="cfg-tabs">
          <button className={`cfg-tab ${tab==="instructions"?"on":""}`} onClick={()=>setTab("instructions")}>INSTRUCTIONS</button>
          <button className={`cfg-tab ${tab==="acronyms"?"on":""}`}     onClick={()=>setTab("acronyms")}>ACRONYMS & TERMS</button>
          <button className={`cfg-tab ${tab==="about"?"on":""}`}        onClick={()=>setTab("about")}>ABOUT / DOCTRINE</button>
          {/* v012 — OSINT-citation audit tab so analysts can see what each unit was anchored to */}
          <button className={`cfg-tab ${tab==="sources"?"on":""}`}      onClick={()=>setTab("sources")}>SOURCES (OSINT)</button>
        </div>
        <div className="modal-body info-body">
          {tab==="instructions" && <Instructions/>}
          {tab==="acronyms"     && <Acronyms/>}
          {tab==="about"        && <About mission={mission}/>}
          {tab==="sources"      && <SourcesTab mission={mission}/>}
        </div>
      </div>
    </div>
  );
}

function Instructions() {
  return (
    <>
      <h3>1 · BEFORE YOU BEGIN</h3>
      <p>The platform runs as a single self-contained HTML file. No installation. Open in a modern browser; for fully air-gapped use, mirror the CDN assets (Leaflet, milsymbol, React, Babel, Tailwind, fonts, basemap tiles) to a local directory and rewrite the URLs in the head.</p>
      <ol>
        <li>Read the <b>CLASSIFICATION BANNER</b> — confirm the operating environment is correct.</li>
        <li>Confirm the <b>DTG ZULU</b>, <b>THREAT</b>, <b>PHASE</b> and <b>MODE</b> meta blocks before issuing any decision.</li>
      </ol>

      <h3>2 · CONFIG → MISSION EDITOR (in order)</h3>
      <ol>
        <li><b>MISSION</b> — name, operation code, classification, commander, AOR, D-Day (ISO 8601 UTC), <i>Operation Type</i> (Article 5 / NA5CRO / Cooperative Security · v002), <i>Mission Type</i> (Combat / SFA / PSO / NEO / HumAss / Stabilization / COIN · v002), Commander's Intent, <i>Master Narrative</i> (AJP-10 · v002), <i>Centre of Gravity</i> (friendly + adversary · v002), <i>End-state criteria</i> (v002).</li>
        <li><b>PHASES</b> — full CRUD on the phase ladder. Each phase has: code, name, relative day offset (REL), absolute ISO date (ABS), and description.</li>
        <li><b>GEOPOLITICAL</b> events — discrete strategic-level events with phase, DTG, source, severity (info / warn / alert), title and narrative.</li>
        <li><b>INTEL EVENTS</b> — same shape as geopolitical, intended for ISR / ELINT / OSINT / FUSION feeds.</li>
        <li><b>OOB</b> — full CRUD on units. Each unit: ID, side (NATO / OPFOR / <b>NEUTRAL</b> · v002), domain (LAND / AIR / SEA / SUB / <b>CYBER</b> · v002), designation, 15-character SIDC (MIL-STD-2525B), type, echelon, readiness, lat/lon, equipment, mission, status. SIDC preview validates symbology in real time.</li>
        <li><b>ACH MATRIX</b> — CRUD on Courses of Action (CoA) per side (NATO / OPFOR / NEUTRAL), then score every Evidence × CoA cell on the v003 5-level scale: <b>1·CC</b> Most Consistent (+2), <b>2·C</b> Consistent (+1), <b>3·N</b> Neutral (0), <b>4·I</b> Inconsistent (-1), <b>5·II</b> Most Inconsistent (-2). Per-CoA totals roll up automatically. Pre-v003 imports using only C / N / I keep working unchanged.</li>
        <li><b>DECISION SUPPORT</b> — read-only ranking of CoAs by ACH score, plus a probabilistic outcome simulator (success / risk / casualties / logistics / escalation) and a turn-history log.</li>
        <li><b>AIS / FUSION</b> — CRUD on commercial vessel records following the Master-Prompt ANNEX AIS schema. Importable from any compliant JSON file. Dark-AIS / suspect tracks render red on the map.</li>
        <li><b>JOINT TARGETING</b> (v002 · AJP-3.9) — JTC phase indicator (1–6), JPTL CRUD with HVT / HPT / TST / NSL categories, F2T2EA stage, CDE rating, restrictions; separate RTL and NSL CRUD lists.</li>
        <li><b>MOVEMENT</b> (v002 · AJP-3.13 / 4.4) — MSR and ASR polylines (status: Open / Contested / Cut), APOD and SPOD point CRUD with status and nation.</li>
        <li><b>POSTURE</b> (v002 · AJP-3.14 / 3.23 / 3.3 / 6) — FPCON (Alpha → Delta), CBRN ALERT (Green / Yellow / Red), PNT status (Nominal / Degraded / Denied), CIS PACE (Primary / Alternate / Contingency / Emergency). All four render as colour-coded tiles on the top bar.</li>
        <li><b>IMPORT / EXPORT</b> — three export modes: full mission, OOB only, or ACH matrix only. Import auto-detects the schema.</li>
        <li><b>SETTINGS</b> — basemap, accent tone, panel density, symbol size, auto-mode toggle.</li>
      </ol>

      <h3>3 · TURN BUTTON (top bar)</h3>
      <p>Pressing <code>◆ TURN · ALLIED|HOSTILE</code> takes control of that faction. Only the active faction's CoAs are shown on the left rail. Each executed CoA flips control automatically.</p>

      <h3>4 · AUTO MODE (deliverable D)</h3>
      <p>Toggling <code>⚙ AUTO ✓</code> simulates the planned LangChain + Ollama + military-foundation-model integration. On a 16 GB-RAM tactical laptop the in-platform decision is a deterministic random pick from the active faction's eligible CoAs. The integration seam is <code>autoSelectCoA()</code> — replace the <code>Math.random()</code> with a foundation-model query when integrating an external model.</p>

      <h3>5 · COMMAND TERMINAL · NL DECISION-SUPPORT</h3>
      <p>The bottom bar accepts plain-language commands. Recognised verbs:</p>
      <ul>
        <li><code>auto</code> / <code>manual</code> — toggle AUTO mode.</li>
        <li><code>turn</code> / <code>switch</code> — flip the active faction.</li>
        <li><code>tally</code> — print force tally per side and domain.</li>
        <li><code>phase 0-3</code> — execute the next phase (sequential).</li>
        <li><code>analyse coas</code> — print the top-three ACH-ranked CoAs.</li>
        <li><code>reset</code> — full operation reset.</li>
        <li><code>help</code> — list verbs.</li>
      </ul>

      <h3>6 · PHASE EXECUTION</h3>
      <ol>
        <li>Phase 0 (POSTURE) is the steady-state reference. No overlays.</li>
        <li>Phase 1 (SHAPING) draws A2/AD bastion circles around configured zones.</li>
        <li>Phase 2 (OFFENSIVE) animates configured phase-2 vectors (ground / naval / air).</li>
        <li>Phase 3 (CONSOLIDATION) draws occupation polygons and severed LOCs.</li>
        <li>Phase narrative log entries fire automatically; configured Geopolitical and Intel events scheduled for that phase are injected too.</li>
      </ol>

      <h3>7 · IMPORT / EXPORT</h3>
      <p>Three mutually-compatible JSON shapes are supported: <code>C23-DIANA-MISSION/1.0</code>, <code>C23-DIANA-OOB/1.0</code>, <code>C23-DIANA-ACH/1.0</code>. Importing a mission resets operational state. Importing OOB or ACH leaves the rest untouched.</p>
    </>
  );
}

function Acronyms() {
  return (
    <>
      <h3>ACRONYMS &amp; TERMS USED IN THE PLATFORM</h3>
      <table className="acro-table">
        <tbody>{ACRONYMS.map(([a,d]) => <tr key={a}><td>{a}</td><td>{d}</td></tr>)}</tbody>
      </table>
    </>
  );
}

function About({ mission }) {
  return (
    <>
      <h3>C23 DIANA NATO WARFIGHTERS · DECISION SUPERIORITY</h3>
      <p>This platform is a CONFIANZA23 prototype submitted to the DIANA "Decision Superiority for NATO Warfighters" challenge. It demonstrates the integration of an AI-augmented Common Operating Picture (COP), a digitalised Joint Targeting Cycle (AJP-3.9), an ACH-driven Decision Support module, and a foundation-model-ready Auto mode — all in a single self-contained HTML file capable of running in strictly air-gapped tactical environments on a 16 GB-RAM laptop.</p>

      <h3>DOCTRINAL FOUNDATION</h3>
      <ul>
        <li><b>AJP-01</b> — Allied Joint Doctrine (capstone).</li>
        <li><b>AJP-3</b> — Conduct of Operations (multi-domain synchronization, behaviour-centric approach).</li>
        <li><b>AJP-3.1 / 3.2 / 3.3 / 3.3.5</b> — Maritime, Land, Air & Space, Airspace Control.</li>

        <li><b>AJP-3.10.1 / AJP-10 / AJP-10.1 / AJP-10.3</b> — PsyOps, StratCom, Info Ops, Public Affairs.</li>
        <li><b>AJP-3.13 / 3.14 / 3.15 / 3.20 / 3.23</b> — Deployment, Force Protection, C-IED, Cyberspace, CWMD.</li>
        <li><b>AJP-4 / 4.3 / 4.4 / 4.6 / 4.10</b> — Sustainment, Host-Nation Support, Movement (RSOM/MSR), JLSG, Medical.</li>

/* v012 — OSINT-citation audit tab. Lists every reference recorded in
   mission.sources[] with the unit IDs it anchors and a click-through URL.
   Pure-presentation; data lives in the mission object so it round-trips
   through JSON export/import like every other field. */
function SourcesTab({ mission }) {
  const srcs = Array.isArray(mission.sources) ? mission.sources : [];
  return (
    <>
      <h3>OOB OSINT CITATIONS · 2026-05-07</h3>
      <p style={{fontSize:12,color:"var(--ink-dim)"}}>
        Each row records the public reference used to anchor one or more units in the current Order of Battle.
        These are the receipts behind the "regenerated" OOB — analysts should treat any unit not covered here as
        unverified and flag it before operational use.
      </p>
      {srcs.length === 0 ? (
        <p style={{fontStyle:"italic",color:"var(--ink-mute)"}}>No sources recorded in <code>mission.sources[]</code>.</p>
      ) : (
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginTop:8}}>
          <thead>
            <tr style={{textAlign:"left",borderBottom:"1px solid var(--line-2)"}}>
              <th style={{padding:"6px 6px",width:"22%"}}>Unit IDs / theme</th>
              <th style={{padding:"6px 6px",width:"28%"}}>Topic</th>
              <th style={{padding:"6px 6px"}}>Reference</th>
              <th style={{padding:"6px 6px",width:"10%"}}>Retrieved</th>
            </tr>
          </thead>
          <tbody>
            {srcs.map((s,i) => (
              <tr key={i} style={{borderBottom:"1px solid var(--line)"}}>
                <td className="mono" style={{padding:"6px 6px",color:"var(--nato-gold)",verticalAlign:"top"}}>
                  {(s.ids||[]).join(", ")}
                </td>
                <td style={{padding:"6px 6px",verticalAlign:"top"}}>{s.topic||"—"}</td>
                <td style={{padding:"6px 6px",verticalAlign:"top"}}>
                  {s.ref||"—"}
                  {s.url ? <> <br/><a href={s.url} target="_blank" rel="noopener noreferrer"
                                        style={{fontSize:11,color:"var(--nato-blue-3)",wordBreak:"break-all"}}>{s.url}</a></> : null}
                </td>
                <td className="mono" style={{padding:"6px 6px",verticalAlign:"top",color:"var(--ink-dim)"}}>{s.retrieved||"—"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
