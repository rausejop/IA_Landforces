.grid-key{display:flex;gap:14px;align-items:center;background:rgba(7,16,33,0.88);border:1px solid rgba(255,199,44,0.35);

.grid-key .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.grid-key .dot.allied{background:var(--allied);} .grid-key .dot.hostile{background:var(--hostile);}
.grid-key .dot.mint{background:var(--mint);} .grid-key .dot.neut{background:var(--neutral);}
.grid-key .dash{display:inline-block;width:18px;height:0;border-top:2px dashed var(--hostile);margin-right:5px;vertical-align:middle;}
.phase-gate{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:600;
  background:rgba(7,16,33,0.94);border:1px solid var(--nato-gold);border-radius:2px;padding:6px;backdrop-filter:blur(4px);
  box-shadow:0 0 20px rgba(255,199,44,0.15);}
.gate-card{display:flex;flex-direction:column;padding:6px 12px;min-width:140px;}
.gate-label{font-size:9px;letter-spacing:0.22em;color:var(--nato-gold);font-weight:700;}
.gate-now{font-size:12px;color:#fff;font-weight:700;margin-top:2px;}
.gate-btn{display:flex;flex-direction:column;align-items:flex-start;
  background:linear-gradient(180deg,var(--nato-blue-2),var(--nato-blue));border:1px solid var(--nato-gold);color:#fff;
  cursor:pointer;padding:6px 14px;border-radius:2px;transition:all .15s;font-family:inherit;}
.gate-btn:hover{background:linear-gradient(180deg,var(--nato-blue-3),var(--nato-blue-2));box-shadow:0 0 0 2px rgba(255,199,44,0.30);}
.gate-cta{font-size:11px;letter-spacing:0.16em;color:#fff;font-weight:700;}
.gate-name{font-size:10px;letter-spacing:0.14em;color:#cfe2ff;font-weight:600;margin-top:1px;}
.leaflet-div-icon{background:transparent !important;border:none !important;}
.unit-marker-app6{cursor:pointer;transition:transform 0.2s;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0px 0px 5px rgba(0,0,0,0.8));}
.unit-marker-app6:hover{transform:scale(1.2);z-index:1000 !important;}
.unit-marker-app6 svg{display:block;}
@keyframes a2adpulse{0%{stroke-opacity:0.85;}50%{stroke-opacity:0.35;}100%{stroke-opacity:0.85;}}
.a2ad-circle,.a2ad-circle-inner{animation:a2adpulse 3s ease-in-out infinite;}
.dossier{grid-column:3;grid-row:1/3;background:linear-gradient(180deg,#08111f,#060c16);border-left:1px solid var(--line);
  display:flex;flex-direction:column;min-height:0;}
.dossier-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#0a1426,#091321);}
.dh-title{font-weight:700;letter-spacing:0.22em;font-size:11.5px;color:var(--nato-gold);}
.dh-sub{font-size:10px;color:var(--ink-mute);letter-spacing:0.18em;margin-top:2px;}
.dossier-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.dossier-empty{text-align:center;color:var(--ink-mute);padding:48px 12px;border:1px dashed var(--line);border-radius:3px;}
.empty-glyph{font-size:36px;color:var(--line-2);margin-bottom:12px;}
.empty-title{font-weight:700;letter-spacing:0.18em;font-size:11.5px;color:var(--ink-dim);}
.empty-hint{font-size:11px;margin-top:6px;line-height:1.5;color:var(--ink-mute);}
.d-card{background:#0a1426;border:1px solid var(--line);border-radius:3px;padding:10px 12px;position:relative;transition:all .15s;}
.d-card.side-NATO{border-left:3px solid var(--allied);} .d-card.side-OPFOR{border-left:3px solid var(--hostile);}
.d-card.selected{box-shadow:0 0 0 1px var(--nato-gold);}
.d-card-head{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.d-symbol{flex:0 0 40px;height:40px;display:flex;align-items:center;justify-content:center;}
.d-id{flex:1;min-width:0;}
.d-desig{font-size:12.5px;font-weight:700;line-height:1.25;color:#fff;}
.d-meta{font-size:10px;color:var(--ink-mute);margin-top:3px;letter-spacing:0.06em;}
.d-x{background:transparent;color:var(--ink-mute);border:1px solid var(--line);width:22px;height:22px;
  cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;}
.d-x:hover{color:var(--hostile);border-color:var(--hostile);}
.d-row{display:flex;gap:8px;margin-top:5px;font-size:11.5px;}
.d-row.d-stack{flex-direction:column;gap:3px;}
.d-k{width:78px;flex:0 0 auto;color:var(--nato-gold);font-size:10px;letter-spacing:0.18em;font-weight:700;padding-top:1px;}
.d-v{color:var(--ink);}
.d-v.status-operational{color:var(--mint);} .d-v.status-engaging{color:var(--amber);} .d-v.status-disrupted{color:var(--hostile);}
.d-eq{margin:2px 0 0 0;padding:0;list-style:none;display:flex;flex-wrap:wrap;gap:4px;}
.d-eq li{font-family:"JetBrains Mono",monospace;font-size:10.5px;background:#0a1426;border:1px solid var(--line);padding:2px 7px;border-radius:2px;color:var(--ink-dim);}
.d-mission{font-size:11.5px;color:var(--ink-dim);line-height:1.45;padding-top:3px;}
.cmdlog{grid-column:2;grid-row:2;background:#02050b;border-top:2px solid var(--nato-gold);
  display:flex;flex-direction:column;min-height:0;box-shadow:inset 0 12px 24px rgba(0,73,144,0.15);}
.cmdlog-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#06101e,#040910);}
.cmdlog-title{font-weight:700;letter-spacing:0.22em;font-size:11px;color:var(--nato-gold);}
.cmdlog-meta{font-size:10px;color:var(--ink-mute);letter-spacing:0.16em;}
.cmdlog-stream{flex:1;overflow-y:auto;padding:8px 14px;font-size:11.5px;line-height:1.55;
  font-family:"Share Tech Mono","JetBrains Mono",monospace;
  background:repeating-linear-gradient(180deg,transparent 0 22px,rgba(255,255,255,0.014) 22px 23px);}
.logline{display:grid;grid-template-columns:80px 78px 1fr;gap:10px;}
.lts{color:#3d6e8c;}
.lpfx{font-weight:700;letter-spacing:0.10em;}
.pfx-C4ISR{color:var(--allied);} .pfx-ISTAR{color:var(--mint);} .pfx-ELINT{color:var(--amber);}
.pfx-SACEUR{color:#c8a8ff;} .pfx-SYS{color:var(--ink-dim);} .pfx-NLP{color:#ffb6e6;}
.pfx-COA{color:#9bf0ff;} .pfx-AIS{color:#7cd8a8;} .pfx-INTEL{color:#ffd28a;}
.pfx-AUTO{color:var(--nato-gold);} .pfx-TURN{color:#fff;} .pfx-KINETIC{color:#ffb6e6;}
.lmsg{color:#c8e3ff;} .tone-warn .lmsg{color:#ffd28a;} .tone-alert .lmsg{color:#ff9c8e;}
.tone-success .lmsg{color:#bff5d8;}
.cmdlog-input{display:flex;gap:6px;padding:6px 10px;border-top:1px solid var(--line);background:#040910;}
.cmdlog-input input{flex:1;background:#070f22;color:var(--ink);border:1px solid var(--line-2);
  padding:6px 10px;font-family:"JetBrains Mono",monospace;font-size:11.5px;border-radius:2px;}
.cmdlog-input input:focus{outline:none;border-color:var(--nato-gold);box-shadow:0 0 0 2px rgba(255,199,44,0.18);}
.cmdlog-input button{background:var(--nato-blue);color:#fff;border:1px solid var(--nato-gold);
  padding:6px 14px;font-family:inherit;font-weight:700;letter-spacing:0.16em;font-size:11px;cursor:pointer;border-radius:2px;}
.cmdlog-input button:hover{background:var(--nato-blue-2);}
.modal-bg{position:fixed;inset:0;background:rgba(2,4,7,0.85);z-index:9000;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal{width:min(960px,92vw);max-height:88vh;background:#0a1426;border:1px solid var(--nato-gold);border-radius:3px;
  display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(0,73,144,0.4);}
.modal.modal-wide{width:min(1320px,96vw);max-height:90vh;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--nato-blue),#001f44);}
.modal-title{font-weight:700;letter-spacing:0.22em;font-size:13px;color:#fff;}
.modal-sub{font-size:10.5px;color:var(--nato-gold);letter-spacing:0.16em;margin-top:2px;}
.modal-x{background:transparent;border:1px solid rgba(255,199,44,0.5);color:#fff;width:30px;height:30px;cursor:pointer;border-radius:2px;font-size:18px;}
.modal-x:hover{color:var(--hostile);border-color:var(--hostile);}
.modal-body{padding:16px 18px;overflow-y:auto;}
.cfg-sec{margin-bottom:18px;}
.cfg-sec h4{font-size:10.5px;letter-spacing:0.22em;color:var(--nato-gold);font-weight:700;margin:0 0 8px;padding-bottom:6px;border-bottom:1px dashed var(--line);}
.cfg-tabs{display:flex;gap:0;padding:0 18px;background:#06122a;border-bottom:1px solid var(--line);overflow-x:auto;}
.cfg-tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--ink-dim);
  font-family:inherit;font-weight:700;letter-spacing:0.16em;font-size:11px;padding:11px 14px;cursor:pointer;text-transform:uppercase;white-space:nowrap;}
.cfg-tab:hover{color:#fff;}
.cfg-tab.on{color:var(--nato-gold);border-bottom-color:var(--nato-gold);background:rgba(0,73,144,0.25);}
.seg{display:flex;gap:0;flex-wrap:wrap;}
.seg-b{border:1px solid var(--line-2);background:#0a1426;color:var(--ink-dim);
  padding:7px 16px;font-size:11px;letter-spacing:0.16em;font-weight:700;cursor:pointer;text-transform:uppercase;font-family:inherit;}
.seg-b:not(:first-child){border-left:none;}
.seg-b.on{background:var(--nato-blue);color:#fff;border-color:var(--nato-gold);}
.btn-create{background:#0d3a2a;color:#7ce8b3;border:1px solid #16a35e;
  padding:7px 14px;font-family:inherit;font-weight:700;cursor:pointer;letter-spacing:0.18em;font-size:11px;border-radius:2px;}
.btn-create:hover{background:#0f5238;box-shadow:0 0 10px rgba(22,163,94,0.4);}
.btn-edit{background:#0d2348;color:#9bc7ff;border:1px solid var(--nato-blue-3);
  padding:4px 10px;font-family:inherit;font-weight:700;cursor:pointer;letter-spacing:0.14em;font-size:10px;border-radius:2px;margin-right:4px;}
.btn-edit:hover{background:var(--nato-blue);}
.btn-del{background:#3a0e10;color:#ffb1ad;border:1px solid var(--hostile);
  padding:4px 10px;font-family:inherit;font-weight:700;cursor:pointer;letter-spacing:0.14em;font-size:10px;border-radius:2px;}
.btn-del:hover{background:#5a1418;}
.btn-sm{font-size:10px;}
.crud-wrap{border:1px solid var(--line);border-radius:3px;max-height:55vh;overflow:auto;}
.crud-table{width:100%;border-collapse:collapse;font-size:11.5px;}
.crud-table th{background:#06122a;color:var(--nato-gold);text-align:left;padding:9px 8px;
  border-bottom:1px solid var(--line-2);font-size:10px;letter-spacing:0.18em;font-weight:700;position:sticky;top:0;z-index:2;}
.crud-table td{padding:6px 8px;border-bottom:1px solid #0e1a31;color:var(--ink);vertical-align:middle;}
.crud-table tr:hover td{background:rgba(0,73,144,0.18);}
.crud-table tr.side-NATO td:nth-child(2),.crud-table tr.side-NATO td:nth-child(3){color:var(--allied);}
.crud-table tr.side-OPFOR td:nth-child(2),.crud-table tr.side-OPFOR td:nth-child(3){color:var(--hostile);}
.crud-sym{display:flex;align-items:center;justify-content:center;width:28px;height:28px;}
.crud-sym svg{width:24px;height:24px;}
.pill{display:inline-block;padding:2px 7px;font-size:9.5px;font-weight:700;letter-spacing:0.14em;border-radius:2px;border:1px solid;}
.pill.side-NATO{color:var(--allied);border-color:rgba(56,149,255,0.5);background:rgba(56,149,255,0.08);}
.pill.side-OPFOR{color:var(--hostile);border-color:rgba(230,57,70,0.5);background:rgba(230,57,70,0.08);}
.status-pill{display:inline-block;padding:2px 7px;font-size:9.5px;font-weight:700;letter-spacing:0.14em;border-radius:2px;
  border:1px solid var(--line-2);background:#0a1426;color:var(--ink-dim);}
.status-pill.st-operational{color:var(--mint);border-color:rgba(124,216,168,0.4);}
.status-pill.st-engaging{color:#ffb33a;border-color:rgba(255,179,58,0.4);}
.status-pill.st-disrupted{color:var(--hostile);border-color:rgba(230,57,70,0.4);}
.status-pill.st-destroyed{color:#ff7a7a;background:#2a0c0e;border-color:var(--hostile);}
.form-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line);}
.form-bar h4{margin:0;color:var(--nato-gold);letter-spacing:0.20em;font-size:12px;}
.sidc-prev{display:flex;align-items:center;gap:10px;background:#06122a;border:1px solid var(--line-2);padding:6px 12px;border-radius:2px;}
.sidc-prev svg{width:38px;height:38px;}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 14px;}
.fld{display:flex;flex-direction:column;gap:4px;}
.fld-full{grid-column:1/-1;}
.fld-label{font-size:10px;color:var(--ink-mute);letter-spacing:0.18em;font-weight:700;text-transform:uppercase;}
.fld .req{color:var(--hostile);margin-left:4px;}
.fld input,.fld select,.fld textarea{background:#070f22;color:var(--ink);border:1px solid var(--line-2);
  padding:7px 10px;font-family:"JetBrains Mono",monospace;font-size:12px;border-radius:2px;}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--nato-gold);box-shadow:0 0 0 2px rgba(255,199,44,0.18);}
.fld textarea{resize:vertical;min-height:46px;}
.form-actions{display:flex;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid var(--line);}
.io-card{background:#06122a;border:1px solid var(--line-2);border-radius:3px;padding:14px 16px;margin-bottom:12px;}
.io-card h4{margin:0 0 6px 0;color:var(--nato-gold);font-size:11.5px;letter-spacing:0.20em;font-weight:700;}
.io-blurb{font-size:11.5px;color:var(--ink-dim);line-height:1.5;margin:0 0 10px 0;}
.io-file{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-dim);}
.oob-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.oob-search{flex:1;min-width:160px;background:#070f22;color:var(--ink);border:1px solid var(--line-2);
  padding:7px 11px;font-family:"JetBrains Mono",monospace;font-size:12px;border-radius:2px;}
.oob-search:focus{outline:none;border-color:var(--nato-gold);box-shadow:0 0 0 2px rgba(255,199,44,0.18);}
.oob-count{font-size:11px;color:var(--ink-mute);letter-spacing:0.16em;}
.badges{display:flex;flex-wrap:wrap;gap:5px;}
.badge{background:#0a1426;border:1px solid rgba(255,199,44,0.35);color:var(--nato-gold);
  padding:3px 9px;border-radius:2px;font-size:10.5px;letter-spacing:0.10em;}
input[type=range]{width:100%;accent-color:var(--nato-gold);}
[data-density="compact"] .rail-sec{padding:9px;}
[data-density="compact"] .d-card{padding:8px 10px;}
[data-density="spacious"] .rail-sec{padding:16px;}
[data-density="spacious"] .d-card{padding:14px 16px;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:#06101e;}
::-webkit-scrollbar-thumb{background:#1a2a48;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#22355c;}
.leaflet-control-zoom a{background:#0a1426 !important;color:#fff !important;border:1px solid rgba(255,199,44,0.35) !important;font-family:inherit !important;}
.leaflet-control-zoom a:hover{background:var(--nato-blue) !important;color:#fff !important;}
.leaflet-control-attribution{background:rgba(7,16,33,0.7) !important;color:var(--ink-mute) !important;font-size:9.5px !important;padding:2px 6px !important;}
.leaflet-tooltip{background:#0a1426 !important;color:#fff !important;border:1px solid var(--nato-gold) !important;
  font-family:inherit !important;font-size:10.5px !important;padding:5px 8px !important;}

/* ── v002 — NEUTRAL side + CYBER domain styling ─── */
.tally-row.side-NEUTRAL{border-left:3px solid var(--neutral);}
.side-NEUTRAL .tally-side{color:var(--neutral);}
.tally-bars-5{grid-template-columns:repeat(5,1fr);}
.chip.side-NEUTRAL.on{border-color:var(--neutral);color:var(--neutral);background:#0c2418;}
.d-card.side-NEUTRAL{border-left:3px solid var(--neutral);}
.crud-table tr.side-NEUTRAL td:nth-child(2),.crud-table tr.side-NEUTRAL td:nth-child(3){color:var(--neutral);}
.pill.side-NEUTRAL{color:var(--neutral);border-color:rgba(116,216,95,0.5);background:rgba(116,216,95,0.08);}
/* CYBER domain marker accent (renders with milsymbol if SIDC supports it; otherwise neutral) */
.unit-marker-app6.domain-CYBER svg, .d-meta.domain-CYBER{filter:hue-rotate(220deg);}

/* ── v002 — Posture meta-block colour code ─── */
.meta-block.posture-fpcon-alpha   .meta-val{color:var(--mint);}
.meta-block.posture-fpcon-bravo   .meta-val{color:#f5d65e;}
.meta-block.posture-fpcon-charlie .meta-val{color:#ff9b3a;}
.meta-block.posture-fpcon-delta   .meta-val{color:var(--hostile);}
.meta-block.posture-cbrn-green    .meta-val{color:var(--mint);}
.meta-block.posture-cbrn-yellow   .meta-val{color:#f5d65e;}
.meta-block.posture-cbrn-red      .meta-val{color:var(--hostile);}
.meta-block.posture-pnt-nominal   .meta-val{color:var(--mint);}
.meta-block.posture-pnt-degraded  .meta-val{color:#f5d65e;}
.meta-block.posture-pnt-denied    .meta-val{color:var(--hostile);}
.meta-block.posture-pace-p .meta-val{color:var(--mint);}
.meta-block.posture-pace-a .meta-val{color:#f5d65e;}
.meta-block.posture-pace-c .meta-val{color:#ff9b3a;}
.meta-block.posture-pace-e .meta-val{color:var(--hostile);}
/* v007 — alternative themes (Cubo D). Only colour vars change; layout intact. */
html[data-theme="light"]{
  --bg-0:#f4f6fb; --bg-1:#eaeef6; --bg-2:#dde4f0; --bg-3:#cad4e6;
  --line:#b9c4dc; --line-2:#9badcb;
  --ink:#0c1426; --ink-dim:#3b4a66; --ink-mute:#6b7a96;
}
html[data-theme="light"] body{background:var(--bg-0);color:var(--ink);}
html[data-theme="light"] .app{background:linear-gradient(180deg,#eaeef6 0%,#dde4f0 100%);}
html[data-theme="light"] .rail,html[data-theme="light"] .dossier{background:linear-gradient(180deg,#eef2fa,#e1e7f3);color:#0c1426;}
html[data-theme="light"] .rail-sec,html[data-theme="light"] .d-card,html[data-theme="light"] .modal,
html[data-theme="light"] .io-card,html[data-theme="light"] .crud-wrap,html[data-theme="light"] .ach-wrap{
  background:#ffffff;color:#0c1426;border-color:#b9c4dc;}
html[data-theme="light"] .crud-table th,html[data-theme="light"] .ach-table th{background:#dde4f0;color:#1b3a72;}
html[data-theme="light"] .crud-table td,html[data-theme="light"] .ach-table td{color:#0c1426;}
html[data-theme="light"] .cmdlog{background:#0c1426;color:#e6edf7;}   /* keep terminal dark — readability */
html[data-theme="light"] .map{background:#cad4e6;}
html[data-theme="light"] .classif{background:#0b8a4a;color:#fff;}     /* banner stays NATO green */
html[data-theme="high-contrast"]{
  --bg-0:#000; --bg-1:#000; --bg-2:#000; --bg-3:#111;
  --line:#fff; --line-2:#fff;
  --ink:#fff; --ink-dim:#fff; --ink-mute:#ccc;
  --nato-blue:#0066ff; --nato-gold:#ffea00;
}
html[data-theme="high-contrast"] body{background:#000;color:#fff;}
html[data-theme="high-contrast"] .rail-sec,html[data-theme="high-contrast"] .d-card,
html[data-theme="high-contrast"] .modal,html[data-theme="high-contrast"] .io-card{
  background:#000;border:1.5px solid #fff;color:#fff;}

/* v007 — slide-down animation when expanding rail sections (Cubo D) */
@keyframes c23-slide-down{from{opacity:0;transform:translateY(-6px);} to{opacity:1;transform:none;}}
.rail-sec:not(.is-collapsed) > :not(.sec-head):not(.sec-head-toggle){animation: c23-slide-down 180ms ease-out;}

/* v007 — persistent active-faction indicator: 3-px coloured strip atop the rail */
.rail{position:relative;}
.rail:before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--allied);transition:background .25s;}
html[data-faction="OPFOR"]   .rail:before{background:var(--hostile);}
html[data-faction="NEUTRAL"] .rail:before{background:var(--neutral);}

/* v007 — rich tooltips (Cubo D) — use data-tip attr; CSS-only render */
[data-tip]{position:relative;}
[data-tip]:hover:after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#0a1426;color:var(--ink);font-size:11px;letter-spacing:0.04em;line-height:1.45;
  padding:6px 10px;border:1px solid var(--nato-gold);border-radius:3px;
  white-space:pre-wrap;max-width:280px;text-align:left;
  box-shadow:0 6px 18px rgba(0,0,0,0.55);z-index:9100;pointer-events:none;
}

/* v006 — print CSS: hide noisy chrome, show the COP + identity */
@media print {
  body { background:#fff !important; color:#000 !important; }
  .modal-bg, .cmdlog, .topbar-actions-grid, .rail-controls { display:none !important; }
  .classif { background:#fff !important; color:#000 !important; border-bottom:1px solid #000; }
  .topbar  { background:#fff !important; color:#000 !important; border-bottom:1px solid #000; }
  .meta-block { background:transparent !important; color:#000 !important; border-color:#999 !important; }
  .meta-label { color:#000 !important; } .meta-val { color:#000 !important; }
  .rail-sec { break-inside: avoid; }
  .stage { box-shadow:none !important; }
}
/* v005 — WX tile colour code */
.meta-block.wx-clear    .meta-val{color:var(--mint);}
.meta-block.wx-marginal .meta-val{color:#f5d65e;}
.meta-block.wx-adverse  .meta-val{color:#ff9b3a;}
.meta-block.wx-severe   .meta-val{color:var(--hostile);}

/* ── ACH MATRIX ─── */
.ach-wrap{overflow:auto;max-height:62vh;border:1px solid var(--line);border-radius:3px;}
.ach-table{border-collapse:collapse;font-size:11.5px;min-width:100%;}
.ach-table th,.ach-table td{border:1px solid var(--line);padding:6px 8px;vertical-align:top;text-align:center;}
.ach-table th{background:#06122a;color:var(--nato-gold);font-size:10px;letter-spacing:0.16em;font-weight:700;
  position:sticky;top:0;z-index:2;}
.ach-table td.ev-cell{text-align:left;background:#08111f;color:var(--ink-dim);max-width:300px;}
.ach-table td.ev-cell .ev-ttl{color:#fff;font-weight:700;}
.ach-table td.ev-cell .ev-meta{font-size:10px;color:var(--ink-mute);font-family:"JetBrains Mono",monospace;}
.ach-table .coa-h{min-width:130px;}
.ach-table .coa-h .coa-name{display:block;color:#fff;font-weight:700;font-size:11.5px;letter-spacing:0.10em;}
.ach-table .coa-h .coa-side{font-size:9.5px;letter-spacing:0.16em;}
.ach-table .coa-h.side-NATO .coa-side{color:var(--allied);}
.ach-table .coa-h.side-OPFOR .coa-side{color:var(--hostile);}
.ach-cell-edit{width:100%;background:#070f22;color:var(--ink);border:1px solid var(--line-2);
  padding:4px 6px;font-family:"JetBrains Mono",monospace;font-size:11px;border-radius:2px;text-align:center;}
.ach-score{font-weight:700;font-family:"JetBrains Mono",monospace;font-size:14px;}
.ach-tot{background:#0a1426;color:var(--nato-gold);}
.ach-legend{display:flex;gap:14px;font-size:10.5px;color:var(--ink-mute);letter-spacing:0.10em;margin-top:8px;flex-wrap:wrap;}
.ach-legend b{color:var(--nato-gold);}
/* v003 — 5-level ACH cell colour-coding by selected value */
.ach-cell-edit.ach-sel-CC{background:#093321;color:#bff5d8;border-color:#1e9b6a;}
.ach-cell-edit.ach-sel-C {background:#0c2a20;color:#7cd8a8;border-color:#2f7a55;}
.ach-cell-edit.ach-sel-N {background:#101a2c;color:#92a1bd;border-color:var(--line-2);}
.ach-cell-edit.ach-sel-I {background:#2a1a0c;color:#ffb33a;border-color:#7a5a2f;}
.ach-cell-edit.ach-sel-II{background:#3a0e10;color:#ffb1ad;border-color:var(--hostile);}
.ach-cell-edit.ach-sel-none{opacity:0.55;}
.coa-card{background:#0a1426;border:1px solid var(--line);border-radius:3px;padding:8px 12px;margin-bottom:8px;}
.coa-card.side-NATO{border-left:3px solid var(--allied);} .coa-card.side-OPFOR{border-left:3px solid var(--hostile);}
.coa-card.selected{box-shadow:0 0 0 1px var(--nato-gold);}

/* ── NLP / CMDR INPUT ─── */
.nlp-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.nlp-suggestion{font-size:10px;letter-spacing:0.10em;background:#0d2348;color:#9bc7ff;border:1px solid var(--nato-blue-3);
  padding:3px 8px;border-radius:2px;cursor:pointer;font-family:"JetBrains Mono",monospace;}
.nlp-suggestion:hover{background:var(--nato-blue);}

/* ── INFO MODAL ─── */
.info-body{font-size:12.5px;line-height:1.55;color:var(--ink);max-height:74vh;overflow-y:auto;padding:0 4px;}
.info-body h3{color:var(--nato-gold);letter-spacing:0.16em;font-size:13px;margin:18px 0 6px;border-bottom:1px solid var(--line);padding-bottom:4px;}
.info-body h4{color:#fff;letter-spacing:0.10em;font-size:12px;margin:12px 0 4px;}
.info-body p{margin:4px 0 8px;color:var(--ink-dim);}
.info-body ol,.info-body ul{margin:4px 0 10px 22px;color:var(--ink-dim);}
.info-body li{margin:3px 0;}
.info-body code{background:#06122a;padding:1px 6px;border:1px solid var(--line-2);border-radius:2px;
  font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--mint);}
.acro-table{width:100%;border-collapse:collapse;margin-top:4px;}
.acro-table td{padding:5px 8px;border-bottom:1px solid var(--line);font-size:11.5px;vertical-align:top;}
.acro-table td:first-child{color:var(--nato-gold);font-family:"JetBrains Mono",monospace;font-weight:700;width:120px;letter-spacing:0.06em;}
.acro-table td:last-child{color:var(--ink-dim);}

/* ── TIMELINE / EVENTS ─── */
.tl-list{list-style:none;padding:0;margin:0;}
.tl-list li{display:grid;grid-template-columns:90px 110px 1fr 90px;gap:8px;padding:6px 8px;
  border-bottom:1px solid var(--line);font-size:11.5px;align-items:center;}
.tl-list li:hover{background:rgba(0,73,144,0.12);}
.tl-kind{font-size:9.5px;letter-spacing:0.18em;font-weight:700;padding:2px 6px;border-radius:2px;text-align:center;}
.tl-kind.K-GEO{color:#c8a8ff;border:1px solid #6042b0;background:rgba(96,66,176,0.15);}
.tl-kind.K-INTEL{color:#ffd28a;border:1px solid #b07f30;background:rgba(176,127,48,0.15);}
.tl-kind.K-AIS{color:var(--mint);border:1px solid #2f7a55;background:rgba(47,122,85,0.15);}
.tl-kind.K-NARR{color:var(--allied);border:1px solid var(--nato-blue-3);background:rgba(27,123,224,0.10);}
.tl-dtg{color:var(--ink-mute);font-family:"JetBrains Mono",monospace;font-size:10.5px;}
.tl-msg{color:var(--ink);}
.tl-acts{display:flex;gap:4px;justify-content:flex-end;}

/* ── COA / DECISION SUPPORT ─── */
.coa-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media (max-width:900px){.coa-grid{grid-template-columns:1fr;}}
.coa-panel{background:#06122a;border:1px solid var(--line-2);border-radius:3px;padding:12px;}
.coa-panel h5{margin:0 0 8px;color:var(--nato-gold);font-size:10.5px;letter-spacing:0.18em;font-weight:700;}
.coa-bar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:11px;}
.coa-bar .lbl{width:96px;color:var(--ink-dim);font-size:10.5px;letter-spacing:0.10em;}
.coa-bar .meter{flex:1;height:8px;background:#0a1426;border:1px solid var(--line);border-radius:2px;overflow:hidden;}
.coa-bar .meter span{display:block;height:100%;background:linear-gradient(90deg,var(--nato-blue-3),var(--nato-gold));}
.coa-bar .pct{width:42px;text-align:right;color:#fff;font-family:"JetBrains Mono",monospace;font-size:11px;}
.coa-mode{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.coa-mode .seg{flex:0 0 auto;}
.auto-on{color:var(--mint);font-weight:700;letter-spacing:0.16em;}
.auto-off{color:var(--ink-mute);letter-spacing:0.16em;}

</style>

/* ======================================================================
   APP — root component
   ====================================================================== */
function App() {
  /* — Mission state (deliverable B: everything previously hardcoded is here) — */
  /* v006 — localStorage persistence (Cubo C). Falls back to DEFAULT_MISSION cleanly. */
  const [mission, setMission]   = useState(()=>{
    try {
      const raw = window.localStorage?.getItem("c23.mission");
      if (raw) return JSON.parse(raw);
    } catch {}
    return deepClone(window.DEFAULT_MISSION);
  });
  const [tweaks,  setTweaks]    = useState(TWEAK_DEFAULTS);

  /* — Operational state — */
  const [units, setUnits]               = useState(()=>{
    try {
      const raw = window.localStorage?.getItem("c23.units");
      if (raw) return JSON.parse(raw);
    } catch {}
    return deepClone(window.DEFAULT_MISSION.oob);
  });
  const [activePhase, setActivePhase]   = useState(0);
  const [logEntries, setLogEntries]     = useState([
    {ts: fmtZulu(), prefix:"SYS",   msg:"C23 DIANA NATO Warfighters initialised. Mission loaded.", tone:"info"},
    {ts: fmtZulu(), prefix:"C4ISR", msg:"All eFP BGs report green. SNMG1 station-keeping vic Bornholm.",         tone:"info"}
  ]);
  const [dossier, setDossier]           = useState([]);
  const [selectedId, setSelectedId]     = useState(null);
  const [filter, setFilter]             = useState({ NATO:true, OPFOR:true, NEUTRAL:true, LAND:true, AIR:true, SEA:true, SUB:true, CYBER:true });
  const [now, setNow]                   = useState(new Date());
  const [showConfig, setShowConfig]     = useState(false);
  const [showInfo, setShowInfo]         = useState(false);
  /* Turn / Faction control (deliverable E) */
  const [activeFaction, setActiveFaction] = useState("NATO");   // "NATO" or "OPFOR"
  /* v005 — ROE authorisation modal (WF-01 + WF-02) */
  const [roePending, setRoePending] = useState(null); // { coa, mode, reason }
  /* v004 — collapsible left-rail sections */
  const [railOpen, setRailOpen] = useState({ phase:true, tally:true, layers:true, coa:true });
  const toggleRail   = (k) => setRailOpen(s => ({...s, [k]:!s[k]}));
  const expandAllRail   = () => setRailOpen({ phase:true,  tally:true,  layers:true,  coa:true  });
  const collapseAllRail = () => setRailOpen({ phase:false, tally:false, layers:false, coa:false });
  /* COA history */
  const [coaHistory, setCoaHistory]     = useState([]);

  useEffect(()=>{ const t=setInterval(()=>setNow(new Date()),1000); return ()=>clearInterval(t); },[]);

  /* v006 — persist mission + units to localStorage on every change */
  useEffect(()=>{ try { window.localStorage?.setItem("c23.mission", JSON.stringify(mission)); } catch {} }, [mission]);
  useEffect(()=>{ try { window.localStorage?.setItem("c23.units",   JSON.stringify(units));   } catch {} }, [units]);

  /* v006 — undo/redo stack (in-memory, capped at 30 entries) for mission edits */
  const undoStack = useRef([]);
  const redoStack = useRef([]);
  const snapshotForUndo = useCallback(() => {
    undoStack.current.push({ mission: deepClone(mission), units: deepClone(units) });
    if (undoStack.current.length > 30) undoStack.current.shift();
    redoStack.current = [];
  }, [mission, units]);
  const undo = useCallback(() => {
    if (!undoStack.current.length) return;
    redoStack.current.push({ mission: deepClone(mission), units: deepClone(units) });
    const prev = undoStack.current.pop();
    setMission(prev.mission); setUnits(prev.units);
  }, [mission, units]);
  const redo = useCallback(() => {
    if (!redoStack.current.length) return;
    undoStack.current.push({ mission: deepClone(mission), units: deepClone(units) });
    const next = redoStack.current.pop();
    setMission(next.mission); setUnits(next.units);
  }, [mission, units]);

  useEffect(() => {
    const tone = ACCENT_TONES[tweaks.accentTone] || ACCENT_TONES.arctic;
    const root = document.documentElement;
    root.style.setProperty("--allied", tone.allied);
    root.style.setProperty("--hostile", tone.hostile);
    root.style.setProperty("--mint", tone.mint);
    root.dataset.density = tweaks.panelDensity;
    /* v007 — theme attribute drives [data-theme="light|dark|high-contrast"] CSS rules */
    root.dataset.theme   = tweaks.theme || "dark";
    /* v007 — active-faction attribute drives a persistent border highlight */
    root.dataset.faction = activeFaction;
  }, [tweaks.accentTone, tweaks.panelDensity, tweaks.theme, activeFaction]);

  const setTweak = (k,v) => setTweaks(t => typeof k==="object" ? {...t,...k} : {...t,[k]:v});

  /* — Logging helpers — */
  const pushLog = useCallback((prefix,msg,tone="info") =>
    setLogEntries(l => [...l, {ts:fmtZulu(), prefix, msg, tone}]), []);

  /* — Map refs — */
  const mapRef = useRef(null), mapEl = useRef(null), tileRef = useRef(null);
  const markersRef = useRef({}), dynamicLayerRef = useRef([]), animFramesRef = useRef([]);
  const aisLayerRef = useRef([]);

  /* v006 — fly-to-and-pulse helper: any tab can call window.__c23_flyTo(unit) to
     focus the COP on a specific unit, pin its dossier, and pulse a transient ring. */
  const flyToUnit = useCallback((u) => {
    const m = mapRef.current; if (!m || !u?.coordinates) return;
    m.setView([u.coordinates.lat, u.coordinates.lng], Math.max(m.getZoom(), 7), { animate:true });
    setTimeout(()=>{
      const ring = L.circleMarker([u.coordinates.lat, u.coordinates.lng],
        { radius:18, color:"#FFC72C", fillColor:"#FFC72C", fillOpacity:0.0, weight:3 }).addTo(m);
      let r = 18;
      const t = setInterval(()=>{ r += 3; ring.setRadius(r); ring.setStyle({opacity:Math.max(0,(40-r)/22)}); }, 60);
      setTimeout(()=>{ clearInterval(t); m.removeLayer(ring); }, 1300);
    }, 250);
    pinDossier(u);
  }, []);
  useEffect(() => { window.__c23_flyTo = flyToUnit; }, [flyToUnit]);

  /* — Init map — */
  useEffect(() => {
    if (mapRef.current) return;
    const m = L.map(mapEl.current, { center:[mission.mapSettings.centerLat, mission.mapSettings.centerLng],
      zoom:mission.mapSettings.zoom, minZoom:3, maxZoom:10, zoomControl:false, attributionControl:false });
    L.control.zoom({position:"bottomright"}).addTo(m);
    L.control.attribution({position:"bottomleft", prefix:false}).addTo(m);
    mapRef.current = m;
  }, []);

  /* — Basemap swap — */
  useEffect(() => {
    const m = mapRef.current; if (!m) return;
    if (tileRef.current) m.removeLayer(tileRef.current);
    const bm = BASEMAPS[tweaks.basemap] || BASEMAPS["carto-voyager"];
    tileRef.current = L.tileLayer(bm.url, { attribution:bm.attr, subdomains:"abcd", maxZoom:19 }).addTo(m);
  }, [tweaks.basemap]);

  /* — Render unit markers — */
  useEffect(() => {
    const m = mapRef.current; if (!m) return;
    Object.values(markersRef.current).forEach(mk => m.removeLayer(mk));
    markersRef.current = {};
    units.forEach(u => {
      if (!filter[u.side] || !filter[u.domain]) return;
      const marker = L.marker([u.coordinates.lat, u.coordinates.lng], {
        icon: buildSidcIcon(u, tweaks.symbolSize),
        zIndexOffset: u.side==="OPFOR" ? 100 : 200
      }).addTo(m);
      marker.on("click", (ev) => { L.DomEvent.stopPropagation(ev); pinDossier(u); });
      markersRef.current[u.id] = marker;
    });
  }, [units, filter, tweaks.symbolSize]);

  /* — CUI markers — */
  useEffect(() => {
    const m = mapRef.current; if (!m) return;
    const layers = [];
    if (tweaks.showCUI) {
      mission.cuiNodes.forEach(n => {
        const mk = L.circleMarker(n.coords, { radius:5, color:"#7cd8a8", fillColor:"#7cd8a8", fillOpacity:0.7, weight:2 })
          .bindTooltip(`<b>${n.name}</b><br/>${n.kind} · CUI`, {direction:"top",offset:[0,-6]}).addTo(m);
        layers.push(mk);
      });
    }
    return () => layers.forEach(l => m.removeLayer(l));
  }, [tweaks.showCUI, mission.cuiNodes]);

  /* — AIS overlay (deliverable F: civilian/maritime fusion) — */
  useEffect(() => {
    const m = mapRef.current; if (!m) return;
    aisLayerRef.current.forEach(l => m.removeLayer(l));
    aisLayerRef.current = [];
    if (!tweaks.showAIS) return;
    (mission.aisFeed?.DATA || []).forEach(v => {
      const lat = parseFloat(v.LAT), lng = parseFloat(v.LON);
      if (Number.isNaN(lat)||Number.isNaN(lng)) return;
      const dark = (v.DESTINATION||"").toUpperCase().includes("AIS OFF") || (v.FLAG==="RU" && v.SHIPNAME?.startsWith("DARK"));
      const color = dark ? "#e85d50" : "#7cd8a8";
      const tri = L.polygon([[lat+0.06,lng],[lat-0.04,lng-0.06],[lat-0.04,lng+0.06]],
        { color, fillColor:color, fillOpacity:0.55, weight:1 })
        .bindTooltip(`<b>${v.SHIPNAME}</b><br/>${v.TYPE_NAME} · ${v.FLAG}<br/>MMSI ${v.MMSI} · ${v.SPEED} kn ${v.HEADING}°<br/>Last port: ${v.LAST_PORT||"—"}`,
          {direction:"top",offset:[0,-6]}).addTo(m);
      aisLayerRef.current.push(tri);
    });
  }, [tweaks.showAIS, mission.aisFeed]);

  /* v002 — Movement entities (MSR / ASR polylines, APOD / SPOD points) */
  const movementLayerRef = useRef([]);
  useEffect(() => {
    const m = mapRef.current; if (!m) return;
    movementLayerRef.current.forEach(l => m.removeLayer(l));
    movementLayerRef.current = [];
    if (tweaks.showMovement===false) return;
    const mov = mission.movement || {};
    const statusColor = (s) => s==="Cut" ? "#e85d50" : s==="Contested" ? "#f59e0b" : "#7cd8a8";
    (mov.msrs||[]).forEach(r => {
      const ln = L.polyline(r.coords, { color:statusColor(r.status), weight:4, opacity:0.85 })
        .bindTooltip(`<b>${r.name}</b><br/>MSR · ${r.status}`, {direction:"top"}).addTo(m);
      movementLayerRef.current.push(ln);
    });
    (mov.asrs||[]).forEach(r => {
      const ln = L.polyline(r.coords, { color:statusColor(r.status), weight:3, opacity:0.7, dashArray:"4,6" })
        .bindTooltip(`<b>${r.name}</b><br/>ASR · ${r.status}`, {direction:"top"}).addTo(m);
      movementLayerRef.current.push(ln);
    });
    (mov.apods||[]).forEach(p => {
      const mk = L.circleMarker(p.coords, { radius:7, color:"#9bc7ff", fillColor:"#1b7be0", fillOpacity:0.8, weight:2 })
        .bindTooltip(`<b>${p.name}</b><br/>APOD · ${p.nation} · ${p.status}`, {direction:"top",offset:[0,-6]}).addTo(m);
      movementLayerRef.current.push(mk);
    });
    (mov.spods||[]).forEach(p => {
      const mk = L.circleMarker(p.coords, { radius:7, color:"#7cd8a8", fillColor:"#0b8a4a", fillOpacity:0.8, weight:2 })
        .bindTooltip(`<b>${p.name}</b><br/>SPOD · ${p.nation} · ${p.status}`, {direction:"top",offset:[0,-6]}).addTo(m);
      movementLayerRef.current.push(mk);
    });
  }, [tweaks.showMovement, mission.movement]);

  /* v002 — JPTL targets (AJP-3.9 prioritised target list) */
  const jptlLayerRef = useRef([]);
  useEffect(() => {
    const m = mapRef.current; if (!m) return;
    jptlLayerRef.current.forEach(l => m.removeLayer(l));
    jptlLayerRef.current = [];
    if (tweaks.showJPTL===false) return;
    const cat = (c) => c==="HVT" ? "#FFC72C" : c==="HPT" ? "#f59e0b" : c==="TST" ? "#e85d50" : "#9bc7ff";
    (mission.jointTargeting?.jptl||[]).forEach(t => {
      const ring = L.circleMarker(t.coords, { radius:11, color:cat(t.category), fillColor:cat(t.category),
        fillOpacity:0.0, weight:2, dashArray:"3,3" })
        .bindTooltip(`<b>${t.category} · ${t.name}</b><br/>Priority ${t.priority} · F2T2EA ${t.f2t2ea}<br/>` +
          `${t.intent}<br/>CDE ${t.cde} · ${t.restrictions}`, {direction:"top",offset:[0,-12]}).addTo(m);
      const dot  = L.circleMarker(t.coords, { radius:3, color:cat(t.category), fillColor:cat(t.category),
        fillOpacity:1, weight:1 }).addTo(m);
      jptlLayerRef.current.push(ring, dot);
    });
  }, [tweaks.showJPTL, mission.jointTargeting]);

  /* v011 — Personnel Recovery overlay (AJP-3.7). Renders each isolated person at
     last-known position with a stage-coloured marker and tooltip. */
  const ipLayerRef = useRef([]);
  useEffect(() => {
    const m = mapRef.current; if (!m) return;
    ipLayerRef.current.forEach(l => m.removeLayer(l));
    ipLayerRef.current = [];
    if (tweaks.showIPs===false) return;
    const stageColor = (s) => ({
      "Reported":"#e85d50", "Located":"#f59e0b", "Supported":"#FFC72C",
      "Recovered":"#7cd8a8", "Reintegrated":"#3895FF"
    })[s] || "#e85d50";
    (mission.personnelRecovery?.isolated||[]).forEach(ip => {
      if (!Array.isArray(ip.lastKnownPos)) return;
      const c = stageColor(ip.status);
      const ring = L.circleMarker(ip.lastKnownPos,
        { radius:13, color:c, fillColor:c, fillOpacity:0.0, weight:2, dashArray:"2,4" })
        .bindTooltip(`<b>${ip.callsign||"IP"}</b> · ${ip.status||"Reported"}<br/>${ip.name||""}<br/>` +
          `${ip.notes||""}`, {direction:"top",offset:[0,-12]}).addTo(m);
      const cross = L.circleMarker(ip.lastKnownPos,
        { radius:4, color:"#fff", fillColor:c, fillOpacity:1, weight:2 }).addTo(m);
      ipLayerRef.current.push(ring, cross);
    });
  }, [tweaks.showIPs, mission.personnelRecovery]);

  /* v011 — Naval interdiction polygon overlay (AJP-3.1). Reads
     mission.movement.navalInterdict (if present) — a [[lat,lng],...] polygon
     editable from the MOVEMENT tab. Renders dashed red. */
  const navalInterdictRef = useRef(null);
  useEffect(() => {
    const m = mapRef.current; if (!m) return;
    if (navalInterdictRef.current) { m.removeLayer(navalInterdictRef.current); navalInterdictRef.current = null; }
    if (tweaks.showMovement===false) return;
    const ni = mission.movement?.navalInterdict;
    if (Array.isArray(ni) && ni.length >= 3) {
      navalInterdictRef.current = L.polygon(ni, {
        color:"#e85d50", weight:1.5, fillColor:"#e85d50",
        fillOpacity:0.10, dashArray:"4,6"
      }).bindTooltip("Naval Interdiction Zone (AJP-3.1)", {direction:"top"}).addTo(m);
    }
  }, [tweaks.showMovement, mission.movement]);

  /* — Helpers for dossier — */
  const pinDossier = useCallback((u) => {
    setSelectedId(u.id);
    setDossier(d => d.find(x=>x.id===u.id) ? d : [u, ...d]);
  }, []);
  const dismissDossier = (id) => setDossier(d => d.filter(u=>u.id!==id));
  const purgeDossier   = () => setDossier([]);

  /* — Animate marker — */
  const animateUnit = useCallback((unitId, target, duration) => {
    const marker = markersRef.current[unitId]; if (!marker) return;
    const start = marker.getLatLng();
    const dLat = target[0] - start.lat, dLng = target[1] - start.lng;
    let t0 = null;
    const step = (ts) => {
      if (!t0) t0 = ts;
      const pct = Math.min((ts - t0)/duration, 1);
      const ease = 1 - Math.pow(1-pct, 2.4);
      marker.setLatLng([start.lat + dLat*ease, start.lng + dLng*ease]);
      if (pct < 1) animFramesRef.current.push(requestAnimationFrame(step));
      else setUnits(us => us.map(u => u.id===unitId ? {...u, coordinates:{lat:start.lat+dLat,lng:start.lng+dLng}} : u));
    };
    animFramesRef.current.push(requestAnimationFrame(step));
  }, []);

  /* — Trigger phase — */
  const triggerPhase = useCallback((p) => {
    if (p <= activePhase) { pushLog("SYS", `Phase ${p} already executed. Reset to re-run.`, "warn"); return; }
    if (p !== activePhase + 1) { pushLog("SYS", `Phase ${p} blocked. Phases must execute sequentially.`, "warn"); return; }
    setActivePhase(p);
    const m = mapRef.current;

    if (p === 1 && tweaks.showA2AD) {
      mission.a2adZones.forEach(z => {
        const c = L.circle(z.center, { radius:z.radiusKm*1000, color:z.color, weight:1.5,
          fillColor:z.color, fillOpacity:0.10, dashArray:"4,6", className:"a2ad-circle" }).addTo(m);
        const inner = L.circle(z.center, { radius:z.radiusKm*1000*0.55, color:z.color, weight:1,
          fillColor:z.color, fillOpacity:0.18, className:"a2ad-circle-inner" }).addTo(m);
        dynamicLayerRef.current.push(c, inner);
      });
    }
    /* v012 — animation pipeline restored: side-aware colour (NATO blue / OPFOR
       red / NEUTRAL green), per-domain duration. Both phase 2 and phase 3 now
       animate via the same helper; phase 3 fires together with the legacy
       seizure / interdict polygons. */
    const renderPhaseVecs = (pv, gKey, nKey, aKey) => {
      const vecs = [];
      Object.entries(pv?.[gKey]||{}).forEach(([id,to])=>vecs.push({id,to,domain:"LAND",duration:6000}));
      Object.entries(pv?.[nKey]||{}).forEach(([id,to])=>vecs.push({id,to,domain:"SEA", duration:7000}));
      Object.entries(pv?.[aKey]||{}).forEach(([id,to])=>vecs.push({id,to,domain:"AIR", duration:4000}));
      vecs.forEach(v => {
        const u = units.find(x=>x.id===v.id); if (!u) return;
        const color = u.side === "OPFOR" ? "#e85d50"
                    : u.side === "NATO"  ? "#3895FF"
                    : "#7CD8A8";
        const line = L.polyline([[u.coordinates.lat,u.coordinates.lng], v.to],
          { color, weight:2, dashArray:"6,8", opacity:0.9 }).addTo(m);
        const head = L.circleMarker(v.to, {radius:4, color, fillColor:color, fillOpacity:1, weight:1}).addTo(m);
        dynamicLayerRef.current.push(line, head);
        animateUnit(v.id, v.to, v.duration);
      });
    };
    if (p === 2) {
      renderPhaseVecs(mission.phaseVectors, "phase2_ground","phase2_naval","phase2_air");
    }
    if (p === 3) {
      const polys = mission.phase3Polygons;
      const occA  = L.polygon(polys.suwalki, {color:"#e85d50", weight:1.5, fillColor:"#e85d50", fillOpacity:0.18}).addTo(m);
      const occB  = L.polygon(polys.narva,   {color:"#e85d50", weight:1.5, fillColor:"#e85d50", fillOpacity:0.18}).addTo(m);
      const navInt= L.polygon(polys.navalInterdict, {color:"#e85d50", weight:1, dashArray:"4,6", fillColor:"#e85d50", fillOpacity:0.10}).addTo(m);
      const cut   = L.polyline(polys.locCut, {color:"#e85d50", weight:5, dashArray:"2,8", opacity:0.95}).addTo(m);
      dynamicLayerRef.current.push(occA,occB,navInt,cut);
      /* v012 — phase 3 animation kicks off in parallel with the polygons */
      renderPhaseVecs(mission.phaseVectors, "phase3_ground","phase3_naval","phase3_air");
    }

    (mission.phaseLogs?.[p] || []).forEach(([dly,prefix,msg,tone]) =>
      setTimeout(()=>pushLog(prefix,msg,tone), dly));

    /* Inject configured geopolitical / intel events scheduled at this phase */
    [...(mission.geopoliticalEvents||[]), ...(mission.intelEvents||[])]
      .filter(e => e.phase === p)
      .forEach(e => {
        const pfx = (mission.geopoliticalEvents||[]).includes(e) ? "INTEL" : (e.source || "INTEL");
        pushLog(pfx, `[${e.title}] ${e.narrative}`, e.severity || "info");
        /* v005 — WF-02: auto-open C-UAS workflow when intel is RADAR + UAV/UAS/drone */
        const txt = `${e.title||""} ${e.narrative||""}`.toLowerCase();
        if ((e.source||"").toUpperCase()==="RADAR" && /\b(uas|uav|drone)\b/.test(txt)) {
          setTimeout(()=>pushLog("C-UAS",
            `[AJP-3.3.5] C-UAS workflow opened — ROE confirmation required for "${e.title}".`, "alert"), 200);
        }
      });

    /* Auto-mode CoA selection (deliverable D) */
    if (tweaks.autoMode) setTimeout(()=>autoSelectCoA(p), 1200);
  }, [activePhase, pushLog, units, animateUnit, tweaks.showA2AD, tweaks.autoMode, mission, activeFaction]);

  /* — Reset op — */
  const resetOp = useCallback(() => {
    animFramesRef.current.forEach(id => cancelAnimationFrame(id));
    animFramesRef.current = [];
    dynamicLayerRef.current.forEach(l => mapRef.current?.removeLayer(l));
    dynamicLayerRef.current = [];
    setUnits(deepClone(mission.oob));
    setActivePhase(0);
    setDossier([]); setSelectedId(null);
    setCoaHistory([]);
    setLogEntries([{ts:fmtZulu(), prefix:"SYS", msg:"Operation RESET. Returning to D-5 posture.", tone:"warn"}]);
  }, [mission.oob]);

  /* — Force tally — */
  const tally = useMemo(() => {
    /* v002 — added NEUTRAL side and CYBER domain */
    const blank = () => ({LAND:0,AIR:0,SEA:0,SUB:0,CYBER:0});
    const t = { NATO:blank(), OPFOR:blank(), NEUTRAL:blank() };
    units.forEach(u => { if (t[u.side]) t[u.side][u.domain] = (t[u.side][u.domain]||0)+1; });
    return t;
  }, [units]);

  /* — Mission JSON I/O (deliverable B: mission OR oob OR both) — */
  const exportMission = (kind="full") => {
    if (kind==="oob") downloadJSON({ schema:"C23-DIANA-OOB/1.0", oob:units }, `C23_OOB_${new Date().toISOString().slice(0,10)}.json`);
    else if (kind==="achmatrix") downloadJSON({ schema:"C23-DIANA-ACH/1.0", achMatrix:mission.achMatrix }, `C23_ACH_${new Date().toISOString().slice(0,10)}.json`);
    else downloadJSON({ ...mission, oob:units, exportDate:new Date().toISOString() }, `C23_MISSION_${new Date().toISOString().slice(0,10)}.json`);
    pushLog("EXPORT", `Exported ${kind} JSON.`, "info");
  };
  const importMission = (data) => {
    /* Accept full mission, OOB-only, ACH-only, or legacy {oob:[]} */
    if (data.schema === "C23-DIANA-OOB/1.0" || (Array.isArray(data.oob) && !data.mission)) {
      setUnits(data.oob.map(u => ({...u, domain:u.domain||getDomainFromSIDC(u.sidc)})));
      pushLog("IMPORT", `OOB-only loaded: ${data.oob.length} units.`, "info"); return;
    }
    if (data.schema === "C23-DIANA-ACH/1.0" || data.achMatrix) {
      setMission(m => ({...m, achMatrix:data.achMatrix||m.achMatrix}));
      pushLog("IMPORT", `ACH matrix loaded.`, "info"); return;
    }
    /* Full mission */
    const merged = {...window.DEFAULT_MISSION, ...data};
    setMission(merged);
    setUnits(deepClone(merged.oob));
    setActivePhase(0); setDossier([]); setSelectedId(null);
    setCoaHistory([]);
    if (merged.mapSettings) {
      mapRef.current?.setView([merged.mapSettings.centerLat, merged.mapSettings.centerLng], merged.mapSettings.zoom||5);
      if (merged.mapSettings.basemap) setTweak("basemap", merged.mapSettings.basemap);
    }
    pushLog("IMPORT", `Mission loaded: ${merged.mission?.name||"(unnamed)"} · ${merged.oob?.length||0} units.`, "info");
  };

  /* — Course-of-Action selection (deliverables C/D/E) — */
  const eligibleCoas = useMemo(() =>
    (mission.achMatrix?.coas||[]).filter(c => c.side === activeFaction), [mission.achMatrix, activeFaction]);

  /* v004 — kinetic turn movement.
     Each executed CoA moves a small batch of the executing faction's units along
     a vector toward the centroid of the opposing faction's positions. If the
     CoA carries an explicit `targetPositions: { unitId:[lat,lng] }` map, those
     overrides win. Movement uses the same animateUnit ease as phase vectors. */
  const executeTurnKineticMovement = useCallback((coa) => {
    const map = mapRef.current; if (!map) return;
    const moverSide = coa.side;
    const enemySide = moverSide === "NATO" ? "OPFOR" : moverSide === "OPFOR" ? "NATO" : "OPFOR";
    const movers  = units.filter(u => u.side === moverSide && u.coordinates);
    const enemies = units.filter(u => u.side === enemySide && u.coordinates);
    if (!movers.length) return;

    /* Target centroid: average of enemy positions (proxy for "front") */
    let cLat = 0, cLng = 0;
    if (enemies.length) {
      enemies.forEach(e => { cLat += e.coordinates.lat; cLng += e.coordinates.lng; });
      cLat /= enemies.length; cLng /= enemies.length;
    } else {
      cLat = (mission.mapSettings?.centerLat ?? 58);
      cLng = (mission.mapSettings?.centerLng ?? 24);
    }

    /* Pick up to 2 movers preferring those closest to the front and not already mid-animation */
    const ranked = movers
      .map(u => ({ u, d: Math.hypot(u.coordinates.lat-cLat, u.coordinates.lng-cLng) }))
      .sort((a,b)=>a.d-b.d).slice(0,4);
    const pickN = Math.min(2, ranked.length);
    const batch = [];
    for (let i=0;i<pickN;i++) batch.push(ranked[Math.floor(Math.random()*ranked.length)].u);

    const overrides = coa.targetPositions || {};
    const colour = moverSide === "NATO" ? "#3895FF" : moverSide === "OPFOR" ? "#e85d50" : "#7CD8A8";

    batch.forEach((u, idx) => {
      let target;
      if (overrides[u.id]) {
        target = overrides[u.id];
      } else {
        /* Step ~ 18% of the way to the centroid plus jitter; keeps movement small per turn */
        const jitter = () => (Math.random()-0.5)*0.25;
        const tLat = u.coordinates.lat + (cLat - u.coordinates.lat)*0.18 + jitter();
        const tLng = u.coordinates.lng + (cLng - u.coordinates.lng)*0.18 + jitter();
        target = [tLat, tLng];
      }
      /* Draw a dashed track for the kinetic move */
      const track = L.polyline([[u.coordinates.lat,u.coordinates.lng], target],
        { color:colour, weight:1.5, dashArray:"4,6", opacity:0.7 }).addTo(map);
      dynamicLayerRef.current.push(track);
      animateUnit(u.id, target, 2200 + idx*250);
    });
    pushLog("KINETIC", `${moverSide} kinetic move: ${batch.map(u=>u.id).join(", ")} → vic ${cLat.toFixed(2)}°N ${cLng.toFixed(2)}°E.`,
      moverSide==="NATO"?"info":"warn");
  }, [units, mission.mapSettings, animateUnit, pushLog]);

  /* v005 — execute a CoA after ROE checks have cleared (or for CoAs that don't need them) */
  const _executeCoaCommitted = useCallback((coa, mode) => {
    const turn = { id:newId("t"), ts:new Date().toISOString(), phase:activePhase, faction:activeFaction,
      coaId:coa.id, coaName:coa.name, mode };
    setCoaHistory(h => [turn, ...h]);
    pushLog(mode==="auto"?"AUTO":"COA",
      `${activeFaction} executes "${coa.name}" — ${coa.description}`, activeFaction==="NATO"?"info":"warn");
    /* v004 — kinetic move on every executed turn */
    executeTurnKineticMovement(coa);
    /* Toggle turn after each CoA so play alternates */
    setActiveFaction(f => f==="NATO" ? "OPFOR" : "NATO");
  }, [activePhase, activeFaction, pushLog, executeTurnKineticMovement]);

  /* v005 — WF-01: gate CoA execution behind a ROE modal when CoA carries
     `requiresROE: true` OR when a TST is present in the JPTL for the executing side. */
  const selectCoA = useCallback((coaId, mode="manual") => {
    const coa = (mission.achMatrix?.coas||[]).find(c=>c.id===coaId); if (!coa) return;
    const tstHits = (mission.jointTargeting?.jptl||[]).filter(t => t.category==="TST" && t.side!==coa.side);
    const needsRoE = coa.requiresROE === true || tstHits.length > 0;
    if (needsRoE) {
      setRoePending({
        coa, mode,
        reason: coa.requiresROE ? "CoA flagged requiresROE" : `TST in JPTL: ${tstHits.map(t=>t.name).join(", ")}`,
        tstHits
      });
      pushLog("ROE", `Authorisation required for "${coa.name}" — awaiting CMDR decision.`, "warn");
      return;
    }
    _executeCoaCommitted(coa, mode);
  }, [mission.achMatrix, mission.jointTargeting, _executeCoaCommitted, pushLog]);

  const confirmRoE = useCallback(() => {
    if (!roePending) return;
    pushLog("ROE", `AUTHORISED — proceeding with "${roePending.coa.name}".`, "success");
    _executeCoaCommitted(roePending.coa, roePending.mode);
    setRoePending(null);
  }, [roePending, _executeCoaCommitted, pushLog]);
  const cancelRoE = useCallback(() => {
    if (!roePending) return;
    pushLog("ROE", `DENIED — "${roePending.coa.name}" cancelled by CMDR.`, "alert");
    setRoePending(null);
  }, [roePending, pushLog]);

  const autoSelectCoA = useCallback((forPhase) => {
    /* TRL7 would query LangChain + Ollama + military foundation model.
       At TRL6+ on 16GB RAM we simulate via random selection from eligible CoAs. */
    const pool = (mission.achMatrix?.coas||[]).filter(c => c.side === activeFaction);
    if (!pool.length) return;
    const pick = pool[Math.floor(Math.random()*pool.length)];
    pushLog("AUTO", `Foundation-model stub → ${activeFaction} selects "${pick.name}" (random simulation).`, "info");
    selectCoA(pick.id, "auto");
  }, [mission.achMatrix, activeFaction, pushLog, selectCoA]);

  /* — NLP / Commander prompt (deliverable F: NL decision-support) — */
  const handleNlp = useCallback((q) => {
    const text = (q||"").trim(); if (!text) return;
    pushLog("NLP", `CMDR > ${text}`, "info");
    const t = text.toLowerCase();
    if (/auto/.test(t))           { setTweak("autoMode", true);  pushLog("NLP","Auto-mode engaged.","success"); }
    else if (/manual/.test(t))    { setTweak("autoMode", false); pushLog("NLP","Manual control restored.","success"); }
    else if (/reset/.test(t))     { resetOp(); pushLog("NLP","Operation reset.","warn"); }
    else if (/turn|switch/.test(t)){ setActiveFaction(f=>f==="NATO"?"OPFOR":"NATO"); pushLog("NLP","Faction switched.","success"); }
    else if (/tally|strength|count/.test(t)) {
      pushLog("NLP", `Tally — NATO L:${tally.NATO.LAND} A:${tally.NATO.AIR} S:${tally.NATO.SEA} U:${tally.NATO.SUB} · ` +
        `OPFOR L:${tally.OPFOR.LAND} A:${tally.OPFOR.AIR} S:${tally.OPFOR.SEA} U:${tally.OPFOR.SUB}`, "info");
    } else if (/phase\s*([0-3])/.test(t)) {
      const p = parseInt(t.match(/phase\s*([0-3])/)[1],10);
      triggerPhase(p);
    } else if (/help|\?/.test(t)) {
      pushLog("NLP", "Try: 'auto', 'manual', 'reset', 'turn', 'tally', 'phase 2', 'analyse coas'.", "info");
    } else if (/(coa|course|analy)/.test(t)) {
      const top = scoreCoas(mission.achMatrix);
      pushLog("COA", `ACH ranking — ${top.slice(0,3).map(r=>`${r.name} (${r.score>=0?"+":""}${r.score})`).join(" · ")}`, "info");
    } else {
      pushLog("NLP", "Stub Foundation-Model response: insufficient signal — please refine prompt or use Decision Support panel.", "warn");
    }
  }, [pushLog, setTweak, resetOp, tally, triggerPhase, mission.achMatrix]);

  const threatLevel = activePhase===0?"GREEN":activePhase===1?"YELLOW":activePhase===2?"ORANGE":"RED";
  const phaseList = mission.phases || [];

  /* v006 — Hotkeys (Cubo C). Disabled while typing in inputs/textareas. */
  useEffect(() => {
    const onKey = (e) => {
      const tag = (e.target && e.target.tagName) || "";
      if (["INPUT","TEXTAREA","SELECT"].includes(tag) || e.target?.isContentEditable) return;
      if (e.metaKey || e.ctrlKey || e.altKey) {
        /* Ctrl/Cmd Z = undo, Ctrl/Cmd Shift Z (or Y) = redo */
        const k = e.key.toLowerCase();
        if (k === "z" && !e.shiftKey) { e.preventDefault(); undo(); return; }
        if ((k === "z" && e.shiftKey) || k === "y") { e.preventDefault(); redo(); return; }
        return;
      }
      const k = e.key;
      if (k === "?" || k === "/") { e.preventDefault(); setShowInfo(s=>!s); return; }
      if (k === "i" || k === "I") { setShowInfo(true); return; }
      if (k === "c" || k === "C") { setShowConfig(true); return; }
      if (k === "t" || k === "T") { setActiveFaction(f=>f==="NATO"?"OPFOR":"NATO"); return; }
      if (k === "a" || k === "A") { setTweak("autoMode", !tweaks.autoMode); return; }
      if (k === "r" || k === "R") { resetOp(); return; }
      if (k === "Escape") { setShowConfig(false); setShowInfo(false); return; }
      /* digits 1..9 → execute that phase if eligible */
      if (/^[1-9]$/.test(k)) {
        const target = parseInt(k,10) - 1; /* "1" → phase 0, "2" → phase 1 */
        if (target >= 0 && target <= activePhase + 1) triggerPhase(target);
        return;
      }
      if (k === "+" || k === "=") { expandAllRail();   return; }
      if (k === "-" || k === "_") { collapseAllRail(); return; }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [tweaks.autoMode, activePhase, undo, redo]);
  const currentPhase = phaseList[activePhase] || phaseList[0] || {code:"—",name:"—",blurb:""};

  /* — RENDER — */
  return (
    <div className="app">
      {/* v004 — banner restyled per user request: classification text and TRL-7 removed
          from the UI. The classification string remains in mission.mission.classification
          (still editable in CONFIG → MISSION and exportable via JSON), so the data is preserved.
          The compliance badges (STANAG/TEMPEST/AIR-GAPPED) stay as the only banner content. */}
      <div className="classif classif-min">
        <span className="classif-spacer"></span>
        <span className="classif-mid">{mission.mission?.name || ""}</span>
        <span>STANAG 4774/4778 · TEMPEST SDIP-27 · AIR-GAPPED</span>
      </div>

      <header className="topbar">
        <div className="brand">
          {/* v004 — NATO logo on the left, CONFIANZA23 immediately to its right */}
          <a href="https://www.nato.int" target="_blank" rel="noopener" className="brand-logo brand-logo-nato"
             title="NATO — official site">
            <img src="https://www.nato.int/content/experience-fragments/nato/site/header/english/master/_jcr_content/root/c06_main_header_copy/logo.coreimg.png/1771861319290/nato.png"
                 alt="NATO"
                 onError={(e)=>{e.target.style.display='none'; e.target.nextSibling.style.display='flex';}}/>
            <span className="brand-logo-fallback">NATO</span>
          </a>
          <a href="https://www.confianza23.es" target="_blank" rel="noopener" className="brand-logo brand-logo-c23"
             title="CONFIANZA23 — official site">
            <img src="https://www.confianza23.es/assets/images/logotipo.png" alt="CONFIANZA23"
                 onError={(e)=>{e.target.style.display='none'; e.target.nextSibling.style.display='flex';}}/>
            <span className="brand-logo-fallback">C23</span>
          </a>
          <div className="brand-text">
            <div className="brand-line1">C23 DIANA NATO WARFIGHTERS <span className="muted">·</span> <span className="gold">DECISION SUPERIORITY</span></div>
            <div className="brand-line2">{mission.mission?.commander||""} · {mission.mission?.aor||""}</div>
          </div>
        </div>

        <div className="topbar-meta">
          <div className="meta-block">
            <div className="meta-label">DTG ZULU</div>
            <div className="meta-val mono">{fmtZulu(now)} · {now.toISOString().slice(0,10).replace(/-/g,"")}</div>
          </div>
          <div className={`meta-block threat threat-${threatLevel.toLowerCase()}`}>
            <div className="meta-label">THREAT</div>
            <div className="meta-val mono">{threatLevel}</div>
          </div>
          <div className="meta-block">
            <div className="meta-label">PHASE</div>
            <div className="meta-val mono">{currentPhase.code} · {currentPhase.name}</div>
          </div>
          <div className="meta-block">
            <div className="meta-label">MODE</div>
            <div className="meta-val mono">{tweaks.autoMode ? "AUTO" : "MANUAL"}</div>
          </div>
          {/* v002 — operational posture indicators (AJP-3.14 / 3.23 / 3.3 / 6); v007 rich tooltips */}
          <div className={`meta-block posture-fpcon-${(mission.posture?.fpcon||"alpha").toLowerCase()}`}
               data-tip="FPCON · Force Protection Condition (AJP-3.14)\nAlpha → Bravo → Charlie → Delta\nEdit in CONFIG → POSTURE.">
            <div className="meta-label">FPCON</div>
            <div className="meta-val mono">{(mission.posture?.fpcon||"—").toUpperCase()}</div>
          </div>
          <div className={`meta-block posture-cbrn-${(mission.posture?.cbrn||"green").toLowerCase()}`}
               data-tip="CBRN ALERT (AJP-3.23)\nGreen · Yellow · Red\nEdit in CONFIG → POSTURE.">
            <div className="meta-label">CBRN</div>
            <div className="meta-val mono">{(mission.posture?.cbrn||"—").toUpperCase()}</div>
          </div>
          <div className={`meta-block posture-pnt-${(mission.posture?.pnt||"nominal").toLowerCase()}`}
               data-tip="PNT · Positioning, Navigation, Timing (AJP-3.3)\nNominal · Degraded · Denied\nDegrades under EW jamming.">
            <div className="meta-label">PNT</div>
            <div className="meta-val mono">{(mission.posture?.pnt||"—").toUpperCase()}</div>
          </div>
          <div className={`meta-block posture-pace-${(mission.posture?.cisPace||"P").toLowerCase()}`}
               data-tip="CIS PACE plan (AJP-6)\nP · Primary  ·  A · Alternate\nC · Contingency  ·  E · Emergency">
            <div className="meta-label">CIS PACE</div>
            <div className="meta-val mono">{(mission.posture?.cisPace||"—")}</div>
          </div>
          <div className="meta-block">
            <div className="meta-label">JTC PHASE</div>
            <div className="meta-val mono">{mission.jointTargeting?.jtcPhase||"—"}/6</div>
          </div>
          {/* v005 — Weather tile (LD-03) — colour-coded by overall state */}
          <div className={`meta-block wx-${(mission.weather?.overall||"clear").toLowerCase()}`} title="Overall weather state">
            <div className="meta-label">WX</div>
            <div className="meta-val mono">{(mission.weather?.overall||"—").toUpperCase().slice(0,8)}</div>
          </div>
          <div className="meta-block">
            <div className="meta-label">OP TYPE</div>
            <div className="meta-val mono">{(mission.mission?.operationType||"—").toUpperCase().slice(0,9)}</div>
          </div>
        </div>

        {/* v004 — NATO logo moved to the left next to CONFIANZA23; right pane keeps only the action grid */}
        <div className="topbar-right">
          <div className="topbar-actions topbar-actions-grid">
            <button className={`btn-turn faction-${activeFaction}`}
              title="Click to take control of the active faction"
              onClick={()=>setActiveFaction(f=>f==="NATO"?"OPFOR":"NATO")}>
              ◆ TURN · {activeFaction==="NATO"?"ALLIED":"HOSTILE"}
            </button>
            <button className="btn-ghost"
              title={tweaks.autoMode?"Auto-mode ON: foundation-model stub picks CoAs":"Manual: user picks CoAs"}
              onClick={()=>setTweak("autoMode", !tweaks.autoMode)}>
              {tweaks.autoMode ? "⚙ AUTO ✓" : "⚙ AUTO"}
            </button>
            <button className="btn-info" onClick={()=>setShowInfo(true)}>ⓘ INFO</button>
            <button className="btn-ghost" onClick={()=>setShowConfig(true)}>⚙ CONFIG</button>
            <button className="btn-danger btn-reset-wide" onClick={resetOp}>↺ RESET OP</button>
          </div>
        </div>
      </header>

      <div className="workbench">
        <aside className="rail">
          {/* v004 — global expand/collapse controls for the four rail sections */}
          <div className="rail-controls">
            <span className="rail-controls-lbl">RAIL</span>
            <button className="btn-ghost-sm" onClick={expandAllRail}   title="Expand every rail section">▾ EXPAND ALL</button>
            <button className="btn-ghost-sm" onClick={collapseAllRail} title="Collapse every rail section">▸ COLLAPSE ALL</button>

/* ──────────── Phase gate ──────────── */
function PhaseGate({ activePhase, phaseList, onTrigger }) {
  const next = phaseList[activePhase + 1];
  const cur  = phaseList[activePhase] || {code:"—",name:"—"};
  return (
    <div className="phase-gate">
      <div className="gate-card">
        <div className="gate-label">CURRENT</div>
        <div className="gate-now mono">{cur.code} · {cur.name}</div>

        <button className="gate-btn" onClick={()=>onTrigger(next.id)}>
          <span className="gate-cta mono">EXECUTE → {next.code}</span>

/* ──────────── ACH scoring helper ──────────── */
/* v003 — 5-level ACH consistency scale (most-consistent → most-inconsistent).
   Old 3-level scores ("C", "N", "I") remain valid (still ±1 / 0) for backward compat. */
const ACH_SCALE = [
  { code:"CC", num:1, label:"Most Consistent",   value:+2, tone:"#bff5d8" },
  { code:"C",  num:2, label:"Consistent",        value:+1, tone:"#7cd8a8" },
  { code:"N",  num:3, label:"Neutral",           value: 0, tone:"#92a1bd" },
  { code:"I",  num:4, label:"Inconsistent",      value:-1, tone:"#ffb33a" },
  { code:"II", num:5, label:"Most Inconsistent", value:-2, tone:"#e85d50" }
];
const ACH_VAL_MAP = ACH_SCALE.reduce((m,r)=>{m[r.code]=r.value; return m;}, {});

function scoreCoas(achMatrix) {
  if (!achMatrix?.coas) return [];
  return achMatrix.coas.map(c => {
    let score = 0, n = 0;
    Object.entries(achMatrix.scores||{}).forEach(([k,v]) => {
      const [, coaId] = k.split("::");
      if (coaId === c.id) { score += (ACH_VAL_MAP[v]||0); n++; }
    });
    return { id:c.id, name:c.name, side:c.side, score, evCount:n };
  }).sort((a,b)=>b.score-a.score);
}

/* v010 — sub-component for branches/sequels free-text list */
function BranchSequelList({ phaseId, kind, mission, setMission }) {
  const phase = (mission.phases||[]).find(p => p.id === phaseId);
  if (!phase) return null;
  const items = phase[kind] || [];
  const setItems = (next) => setMission(m => ({...m, phases:m.phases.map(p =>
    p.id===phaseId ? {...p, [kind]:next} : p)}));
  const add = () => setItems([...items, kind==="branches" ? "BR-? new branch" : "SQ-? new sequel"]);
  const upd = (i,v) => { const a=[...items]; a[i]=v; setItems(a); };
  const del = (i) => { const a=[...items]; a.splice(i,1); setItems(a); };
  const label = kind === "branches" ? "Branches" : "Sequels";
  return (
    <div style={{margin:"4px 0 8px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <span style={{fontSize:10.5,letterSpacing:"0.16em",color:"var(--nato-gold)",fontWeight:700}}>{label.toUpperCase()}</span>
        <button className="btn-edit btn-sm" onClick={add}>+ ADD {kind==="branches"?"BRANCH":"SEQUEL"}</button>
      </div>
      {items.length === 0 && <div style={{fontSize:11,color:"var(--ink-mute)"}}>(none defined)</div>}
      {items.map((it,i) => (
        <div key={i} style={{display:"flex",gap:6,margin:"3px 0"}}>
          <input className="ach-cell-edit" style={{flex:1}} value={it} onChange={e=>upd(i,e.target.value)}/>
          <button className="btn-del btn-sm" onClick={()=>del(i)}>DEL</button>
        </div>
      ))}
    </div>
  );
}

/* ──────── OOB tab (full CRUD on units) ──────── */
function OOBTab({ units, setUnits, pushLog }) {
  const [filter, setFilter] = useState("");
  const [editId, setEditId] = useState(null);
  const blank = { id:"", side:"NATO", domain:"LAND", designation:"", sidc:"SFGPUCA----E---",
    type:"Armored", coordinates:{lat:55,lng:24}, status:"Operational", equipment:"", mission:"", readiness:"R1", echelon:"" };
  const [form, setForm] = useState(blank);
  const [showForm, setShowForm] = useState(false);

  const beginCreate = () => { setEditId(null); setForm(blank); setShowForm(true); };
  const beginEdit = (u) => { setEditId(u.id); setForm({...blank,...u,
    coordinates:u.coordinates||{lat:55,lng:24},
    equipment: Array.isArray(u.equipment)?u.equipment.join(", "):(u.equipment||"")}); setShowForm(true); };
  const del = (u) => { if (window.confirm(`Delete ${u.id} — ${u.designation}?`)) {
    setUnits(arr => arr.filter(x=>x.id!==u.id)); pushLog("OOB", `Unit ${u.id} (${u.designation}) deleted.`, "warn"); } };
  const save = () => {
    if (!form.id.trim() || !form.designation.trim()) { window.alert("ID and Designation are required."); return; }
    const payload = {...form,
      equipment: typeof form.equipment==="string" ? form.equipment.split(",").map(s=>s.trim()).filter(Boolean) : form.equipment,
      coordinates: { lat:parseFloat(form.coordinates.lat), lng:parseFloat(form.coordinates.lng) }};
    setUnits(arr => {
      if (editId && editId!==payload.id) return [...arr.filter(u=>u.id!==editId), payload];
      const exists = arr.some(u=>u.id===payload.id);
      return exists ? arr.map(u=>u.id===payload.id?payload:u) : [...arr, payload];
    });
    pushLog("OOB", `Unit ${payload.id} (${payload.designation}) ${editId?"updated":"created"}.`, "info");
    setShowForm(false); setEditId(null); setForm(blank);
  };
  const sidcPreview = useMemo(()=>{ try { return new ms.Symbol(form.sidc,{size:38,strokeWidth:4,fillOpacity:1}).asSVG(); } catch { return null; } },[form.sidc]);
  const filtered = useMemo(()=>{
    if (!filter.trim()) return units;
    const q = filter.toLowerCase();
    return units.filter(u =>
      u.id.toLowerCase().includes(q) || u.designation.toLowerCase().includes(q) ||
      (u.type||"").toLowerCase().includes(q) || u.side.toLowerCase().includes(q));
  },[units,filter]);

  if (showForm) {
    return (
      <section className="cfg-sec">
        <div className="form-bar">
          <h4>{editId ? `EDIT · ${editId}` : "CREATE NEW UNIT"}</h4>
          <div className="sidc-prev">
            <span className="mono" style={{color:"var(--ink-mute)"}}>SIDC PREVIEW</span>
            {sidcPreview ? <span dangerouslySetInnerHTML={{__html:sidcPreview}}/> : <span className="mono" style={{color:"var(--ink-mute)"}}>— invalid —</span>}
          </div>
        </div>
        <div className="form-grid">
          <Field label="Unit ID" required><input value={form.id} onChange={e=>setForm({...form,id:e.target.value})}/></Field>
          {/* v002 — added NEUTRAL side and CYBER domain */}
          <Field label="Side"><select value={form.side} onChange={e=>setForm({...form,side:e.target.value})}><option>NATO</option><option>OPFOR</option><option>NEUTRAL</option></select></Field>
          <Field label="Domain"><select value={form.domain} onChange={e=>setForm({...form,domain:e.target.value})}><option>LAND</option><option>AIR</option><option>SEA</option><option>SUB</option><option>CYBER</option></select></Field>
          <Field label="Status"><select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}><option>Operational</option><option>Engaging</option><option>Disrupted</option><option>Destroyed</option></select></Field>
          <Field label="Designation" required full><input value={form.designation} onChange={e=>setForm({...form,designation:e.target.value})}/></Field>
          <Field label="SIDC (15-char MIL-STD-2525B)" full><input value={form.sidc} maxLength={15} onChange={e=>setForm({...form,sidc:e.target.value.toUpperCase()})} className="mono"/></Field>
          {/* v010 — datalist autocomplete (CIMIC Liaison / MSU + CTF/CTG/CTU/JLSG) */}
          <Field label="Type"><input list="c23-unit-types" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}/></Field>
          <Field label="Echelon"><input list="c23-echelons" value={form.echelon||""} onChange={e=>setForm({...form,echelon:e.target.value})}/></Field>
          <Field label="Readiness"><select value={form.readiness} onChange={e=>setForm({...form,readiness:e.target.value})}><option>R1</option><option>R2</option><option>R3</option><option>R4</option></select></Field>
          <Field label="(reserved)"><input disabled value="—"/></Field>
          <Field label="Latitude"><input type="number" step="0.001" value={form.coordinates.lat} onChange={e=>setForm({...form,coordinates:{...form.coordinates,lat:e.target.value}})}/></Field>
          <Field label="Longitude"><input type="number" step="0.001" value={form.coordinates.lng} onChange={e=>setForm({...form,coordinates:{...form.coordinates,lng:e.target.value}})}/></Field>
          <Field label="Equipment (comma-separated)" full><input value={form.equipment} onChange={e=>setForm({...form,equipment:e.target.value})}/></Field>
          <Field label="Mission" full><textarea rows={2} value={form.mission} onChange={e=>setForm({...form,mission:e.target.value})}/></Field>
        </div>
        <div className="form-actions">
          <button className="btn-create" onClick={save}>{editId?"SAVE CHANGES":"CREATE UNIT"}</button>
          <button className="btn-ghost" onClick={()=>{setShowForm(false);setEditId(null);}}>CANCEL</button>
        </div>
      </section>
    );
  }

  return (
    <section className="cfg-sec">
      <div className="oob-toolbar">
        <input className="oob-search" placeholder="filter id / designation / type / side" value={filter} onChange={e=>setFilter(e.target.value)}/>
        <span className="oob-count mono">{filtered.length}/{units.length} UNITS</span>
        <button className="btn-create" onClick={beginCreate}>+ CREATE UNIT</button>
      </div>
      <div className="crud-wrap">
        <table className="crud-table">
          <thead><tr><th>SYM</th><th>ID</th><th>SIDE</th><th>DOM</th><th>DESIGNATION</th><th>TYPE</th><th>SIDC</th><th>LAT</th><th>LNG</th><th>STATUS</th><th></th></tr></thead>
          <tbody>{filtered.map(u=><CrudRow key={u.id} unit={u} onEdit={()=>beginEdit(u)} onDel={()=>del(u)}/>)}</tbody>
        </table>
      </div>
    </section>
  );
}

    try { cellRef.current.innerHTML = new ms.Symbol(unit.sidc,{size:22,strokeWidth:4,fillOpacity:1,infoColor:"white"}).asSVG(); } catch {} }, [unit.sidc]);
  return (
    <tr className={`side-${unit.side}`}>

             title="Fly the map to this unit">{unit.designation}</a></td>
